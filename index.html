<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Connexion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-box {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #3b82f6;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background: #2563eb;
    }
    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Connexion</h2>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Mot de passe" />
    <button onclick="login()">Se connecter</button>
    <div id="message" class="error"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    // ⚠️ Remplace ces valeurs par celles de ton projet Supabase
    const supabaseUrl     = "https://rkaymdbyfbmfiutwbjtx.supabase.co";
    const supabaseAnonKey = "sb_publishable_7W-CJaPMGcuVRS5iy0Zx-w_y_KkiGrH";

    const supabase = createClient(supabaseUrl, supabaseAnonKey);

    window.login = async function () {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const message  = document.getElementById('message');

      message.textContent = "";

      if (!email || !password) {
        message.textContent = "Email et mot de passe obligatoires.";
        return;
      }

      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });

        if (error) {
          console.error("Auth error:", error);
          message.textContent = error.message;
          return;
        }

        console.log("Connecté :", data);
        window.location.href = "/dashboard.html";

      } catch (err) {
        console.error(err);
        message.textContent = "Erreur lors de la connexion.";
      }
    };
  </script>
</body>
</html>
