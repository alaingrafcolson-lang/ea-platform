<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SI Governance Enterprise — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    :root {
      --bg-base:    #080b12;
      --bg-surface: #0f1422;
      --bg-panel:   #141929;
      --bg-raised:  #1c2238;
      --border-mid: rgba(255,255,255,0.09);
      --text-pri:   #e2e6f3;
      --text-sec:   #7a84a0;
      --text-ter:   #424d6a;
      --portfolio:  #4b8cf5;
      --ok:         #22c55e;
      --risk:       #ef4444;
      --shadow-md:  0 4px 20px rgba(0,0,0,0.45);
    }
    [data-theme="light"] {
      --bg-base:    #f0f2f8;
      --bg-surface: #ffffff;
      --bg-raised:  #eef0f8;
      --border-mid: rgba(0,0,0,0.10);
      --text-pri:   #111827;
      --text-sec:   #4b5563;
      --text-ter:   #9ca3af;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 13px; }
    body {
      font-family: 'Instrument Sans', sans-serif;
      background: var(--bg-base);
      color: var(--text-pri);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      width: 100%;
      max-width: 480px;
    }
    .login-box {
      background: var(--bg-surface);
      border: 1px solid var(--border-mid);
      border-radius: 16px;
      padding: 48px 40px;
      box-shadow: var(--shadow-md);
      animation: slideUp 0.4s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .logo-dot {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--portfolio);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .login-subtitle {
      font-size: 10px;
      color: var(--text-ter);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 4px;
    }
    .login-description {
      font-size: 12px;
      color: var(--text-sec);
      margin-top: 8px;
      line-height: 1.5;
    }
    .message {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 16px;
      display: none;
    }
    .message.show { display: block; }
    .message.success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.2);
      color: var(--ok);
    }
    .message.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--risk);
    }
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 20px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-ter);
    }
    .form-group input {
      background: var(--bg-raised);
      border: 1px solid var(--border-mid);
      border-radius: 8px;
      color: var(--text-pri);
      font-family: inherit;
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
      transition: all 0.15s;
    }
    .form-group input:focus {
      border-color: var(--portfolio);
      box-shadow: 0 0 0 3px rgba(75, 140, 245, 0.1);
    }
    .form-group input::placeholder {
      color: var(--text-ter);
    }
    button {
      padding: 11px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      outline: none;
    }
    .btn-primary {
      background: var(--portfolio);
      color: white;
      width: 100%;
    }
    .btn-primary:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .theme-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      background: var(--bg-panel);
      border: 1px solid var(--border-mid);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-sec);
      transition: all 0.15s;
    }
    .theme-toggle:hover {
      background: var(--bg-raised);
      color: var(--text-pri);
    }
    .login-footer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border-mid);
      font-size: 10px;
      color: var(--text-ter);
      text-align: center;
      line-height: 1.6;
    }
    @media (max-width: 480px) {
      .login-box { padding: 32px 24px; }
      .login-header { margin-bottom: 24px; }
    }
  </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" title="Basculer le thème">
  <span id="theme-icon">🌙</span>
  <span id="theme-label">Clair</span>
</button>

<div class="login-container">
  <div class="login-box">
    <div class="login-header">
      <div class="login-logo">
        <div class="logo-dot">🏛️</div>
        SI Governance
      </div>
      <div class="login-subtitle">Enterprise Edition</div>
      <div class="login-description">Plateforme de gouvernance IT · ADMIN/COMEX/CODIR/COMCYBER</div>
    </div>

    <div id="message" class="message"></div>

    <form class="login-form" id="login-form">
      <div class="form-group">
        <label for="email">Email professionnel</label>
        <input
          type="email"
          id="email"
          placeholder="prenom.nom@entreprise.fr"
          required
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        >
      </div>

      <button type="submit" class="btn-primary" id="login-btn">
        Connexion
      </button>
    </form>

    <div class="login-footer">
      <div>🔒 Connexion sécurisée | Supabase Auth</div>
      <div style="margin-top: 8px;">Accès réservé aux utilisateurs autorisés</div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://rkaymdbyfbmfiutwbjtx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrYXltZGJ5ZmJtZml1dHdianR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzUxMTYsImV4cCI6MjA4OTg1MTExNn0.uwysDdwNR8Mp8OIW10OIy_11JE9myCUw2VSSoDnov5E';

let supabaseClient;

window.addEventListener('DOMContentLoaded', () => {
  if (window.supabase && window.supabase.createClient) {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    console.log('✅ Supabase initialisé');
    initTheme();
  }
});

function initTheme() {
  const theme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  updateThemeIcon(theme);
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  updateThemeIcon(next);
}

function updateThemeIcon(theme) {
  const icon = document.getElementById('theme-icon');
  const label = document.getElementById('theme-label');
  if (theme === 'dark') {
    icon.textContent = '🌙';
    label.textContent = 'Clair';
  } else {
    icon.textContent = '☀️';
    label.textContent = 'Sombre';
  }
}

function showMessage(text, type = 'info') {
  const msg = document.getElementById('message');
  msg.textContent = text;
  msg.className = `message show ${type}`;
  if (type !== 'error') {
    setTimeout(() => msg.classList.remove('show'), 5000);
  }
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const loginBtn = document.getElementById('login-btn');

  if (!email || !password) {
    showMessage('❌ Email et mot de passe obligatoires', 'error');
    return;
  }

  loginBtn.disabled = true;
  loginBtn.textContent = '⏳ Connexion...';

  try {
    // Récupérer le profil
    const { data: profile, error: profileError } = await supabaseClient
      .from('users_professionnels')
      .select('id, email, nom, prenom, role, statut, password_change_required')
      .eq('email', email)
      .eq('statut', 'actif')
      .single();

    if (profileError || !profile) {
      showMessage('❌ Email ou mot de passe incorrect', 'error');
      await logConnectionAttempt(email, 'echec', 'Email non trouvé ou profil inactif');
      loginBtn.disabled = false;
      loginBtn.textContent = 'Connexion';
      return;
    }

    // Auth Supabase
    const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
      email: email,
      password: password
    });

    if (authError) {
      showMessage('❌ Email ou mot de passe incorrect', 'error');
      await logConnectionAttempt(email, 'echec', authError.message);
      loginBtn.disabled = false;
      loginBtn.textContent = 'Connexion';
      return;
    }

    // Succès
    await logConnectionAttempt(email, 'succes');

    // Enregistrer session
    localStorage.setItem('user_session', JSON.stringify({
      id: profile.id,
      email: profile.email,
      nom: profile.nom,
      prenom: profile.prenom,
      role: profile.role,
      password_change_required: profile.password_change_required,
      logged_in_at: new Date().toISOString()
    }));

    showMessage('✅ Connexion réussie!', 'success');

    // Redirection
    setTimeout(() => {
      if (profile.password_change_required) {
        window.location.href = 'change-password.html';
      } else {
        window.location.href = 'dashboard.html';
      }
    }, 1000);

  } catch (error) {
    console.error('Erreur:', error);
    showMessage('❌ Erreur serveur', 'error');
    loginBtn.disabled = false;
    loginBtn.textContent = 'Connexion';
  }
});

async function logConnectionAttempt(email, statut, motif = null) {
  try {
    if (!supabaseClient) return;
    
    await supabaseClient.from('logs_connexion').insert([{
      email: email,
      statut: statut,
      motif_echec: motif,
      user_agent: navigator.userAgent,
      timestamp: new Date().toISOString()
    }]);
  } catch (error) {
    console.error('Erreur logging:', error);
  }
}
</script>

</body>
</html>
