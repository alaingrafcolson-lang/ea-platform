<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Supabase -->
  <script src="https://unpkg.com/@supabase/supabase-js"></script>

  <style>
    body { font-family: Arial; background:#0f172a; color:white; display:flex; align-items:center; justify-content:center; height:100vh; }
    .box { background:#1e293b; padding:30px; border-radius:10px; width:300px; }
    input, button { width:100%; padding:10px; margin:10px 0; border:none; border-radius:5px; }
    button { background:#3b82f6; color:white; cursor:pointer; }
    .message { margin-top:10px; }
  </style>
</head>

<body>

<div class="box">
  <h2>Connexion</h2>

  <form id="login-form">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Mot de passe" required>
    <button id="login-btn">Connexion</button>
  </form>

  <div id="message" class="message"></div>
</div>

<script>
const SUPABASE_URL = 'https://rkaymdbyfbmfiutwbjtx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrYXltZGJ5ZmJtZml1dHdianR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzUxMTYsImV4cCI6MjA4OTg1MTExNn0.uwysDdwNR8Mp8OIW10OIy_11JE9myCUw2VSSoDnov5E';

// ✅ INIT DIRECT (corrigé)
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);


// ---------------- THEME ----------------
function initTheme() {
  const theme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  updateThemeIcon(theme);
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  updateThemeIcon(next);
}

function updateThemeIcon(theme) {
  const icon = document.getElementById('theme-icon');
  const label = document.getElementById('theme-label');
  if (!icon || !label) return;

  if (theme === 'dark') {
    icon.textContent = '🌙';
    label.textContent = 'Clair';
  } else {
    icon.textContent = '☀️';
    label.textContent = 'Sombre';
  }
}

// ---------------- MESSAGE ----------------
function showMessage(text, type = 'info') {
  const msg = document.getElementById('message');
  if (!msg) return;

  msg.textContent = text;
  msg.className = `message show ${type}`;

  if (type !== 'error') {
    setTimeout(() => msg.classList.remove('show'), 5000);
  }
}
// ---------------- LOGIN ----------------
document.addEventListener('DOMContentLoaded', () => {
  initTheme();

  const form = document.getElementById('login-form');
  if (!form) return;

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const loginBtn = document.getElementById('login-btn');

    if (!email || !password) {
      showMessage('❌ Email et mot de passe obligatoires', 'error');
      return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = '⏳ Connexion...';

    try {
      console.log('Client:', supabaseClient);

          // 🔐 1. AUTH D'ABORD (corrigé)
      const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (authError) {
        showMessage('❌ Email ou mot de passe incorrect', 'error');
        await logConnectionAttempt(email, 'echec', authError.message);
        loginBtn.disabled = false;
        loginBtn.textContent = 'Connexion';
        return;
      }

      const userId = authData.user.id;

      // 👤 2. PROFIL (corrigé auth_user_id + status)
      const { data: profile, error: profileError } = await supabaseClient
        .from('users_professionnels')
        .select('id, email, nom, prenom, role, status, password_change_required')
        .eq('auth_user_id', userId)
        .eq('status', 'actif')
        .single();

      console.log('Profil:', profile);
      console.log('Erreur profil:', profileError);

      if (profileError || !profile) {
        showMessage('❌ Profil introuvable', 'error');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Connexion';
        return;
      }

    // ✅ SUCCESS
    localStorage.setItem('user_session', JSON.stringify(profile));

    showMessage('✅ Connexion réussie');

    setTimeout(() => {
      window.location.href = 'dashboard.html';
    }, 1000);

  } catch (err) {
    console.error(err);
    showMessage('❌ Erreur serveur', 'error');
  }

  btn.disabled = false;
  btn.textContent = 'Connexion';
});
</script>

</body>
</html>
