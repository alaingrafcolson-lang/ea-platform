function showToast(msg,type='success'){
    const t=document.getElementById('toast');
    t.textContent=msg;t.className=`show ${type}`;
    clearTimeout(t._t);t._t=setTimeout(()=>t.className='',3200);
}
function showDebug(msg){const z=document.getElementById('debugZone');z.style.display='block';z.textContent=msg;}
function setScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function roleColor(r){return COLORS[r]||'#888';}
function roleBadge(r){const c=roleColor(r);return `background:${c}22;color:${c};border:1px solid ${c}44;`;}
function fmtDate(d){return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});}
function fmtTime(d){return new Date(d).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}
function spellCheck(text){
    const words=text.split(/\s+/);const out=[];
    words.forEach(w=>{const c=w.toLowerCase().replace(/[^a-zàâäéèêëîïôùûüç]/g,'');
    if(c.length>3&&!DICT.has(c))out.push(w.replace(/[.,;:!?()"']/g,''));});
    return[...new Set(out)].filter(Boolean).slice(0,8);
}

async function init(){

    }catch(err){showLoginForm('Connexion impossible');showDebug('Erreur : '+err.message);}

function showLoginForm(title){

    document.getElementById('authSub').textContent='Connectez-vous pour accéder à la plateforme';
    document.getElementById('authLoader').style.display='none';
    document.getElementById('loginForm').style.display='block';
}
async function doLogin(){
    const email=document.getElementById('loginEmail').value.trim();
    const pwd=document.getElementById('loginPassword').value;
    const btn=document.getElementById('loginBtn');
    if(!email||!pwd){showDebug('Email et mot de passe requis.');return;}
    btn.disabled=true;btn.textContent='Connexion…';
    document.getElementById('debugZone').style.display='none';
    try{
        const{data,error}=await sb.auth.signInWithPassword({email,password:pwd});
        if(error)throw error;
        await loadUserProfile(data.user.email);
    }catch(err){
        btn.disabled=false;btn.textContent='Se connecter';
        showDebug('❌ '+err.message);
    }
}

async function loadUserProfile(email){
    try{
        const{data:profile,error:pErr}=await sb.from('ea_users').select('*').eq('email',email).single();
        if(pErr||!profile){
            const{count}=await sb.from('ea_users').select('*',{count:'exact',head:true});
            if(count===0){
                const{error}=await sb.from('ea_users').insert({email,nom:email.split('@')[0],role:'ADMIN'});
                if(!error){showToast('✅ Super Admin créé');await loadUserProfile(email);return;}
                else{showLoginForm('Erreur initialisation');showDebug('Impossible de créer le Super Admin : '+error.message);return;}
            }
            await sb.auth.signOut();showLoginForm('Accès non autorisé');
            showDebug("❌ Cet email n'a pas de profil. Contactez votre administrateur.");return;
        }
        user=profile;applyUserTheme();
        const[{data:row},{data:projs},{data:snaps},{data:acts},{data:rpts}]=await Promise.all([
            sb.from('ea_platform_data').select('content').eq('id',1).single(),
            sb.from('ea_projects').select('*').order('created_at',{ascending:false}),
            sb.from('ea_kpi_snapshots').select('*').order('snapshot_date',{ascending:false}).limit(12),
            sb.from('ea_activity_log').select('*').order('created_at',{ascending:false}).limit(50),
            sb.from('ea_reports').select('*').order('created_at',{ascending:false}).limit(20)
        ]);
        db=(row&&row.content)?row.content:{};
        projects=projs||[];kpiSnapshots=snaps||[];activityLog=acts||[];reports=rpts||[];
        renderApp();
    }catch(err){showLoginForm('Erreur de chargement');showDebug('Erreur profil : '+err.message);}
}

    const grid=document.getElementById('mainContainer');grid.innerHTML='';

        ta.addEventListener('input',()=>{clearTimeout(deb);deb=setTimeout(()=>{saveNote(tool.id,ta.value);updateSpell(tool.id,ta.value);},700);});

function updateSpell(id,text){
    const bar=document.getElementById(`spell_${id}`);if(!text.trim()){bar.innerHTML='';return;}
    const s=spellCheck(text);
    bar.innerHTML=s.map(w=>`<span class="spell-word" onclick="this.remove()">⚠ ${esc(w)}</span>`).join('');
}
async function saveNote(id,value){
    if(!db)db={};db[`tool_${id}`]=value;
    const{error}=await sb.from('ea_platform_data').upsert({id:1,content:db},{onConflict:'id'});
    const el=document.getElementById(`saved_${id}`);
    if(!error){el.style.display='block';setTimeout(()=>el.style.display='none',2000);
        logActivity('tool_update',String(id),TOOLS.find(t=>t.id===id)?.t||'Outil '+id,`Note mise à jour`);}
    else showToast('❌ Erreur sauvegarde','error');
}

// ════════════════════════════════════════════
//  KPI ENGINE
// ════════════════════════════════════════════
function computeKPI(){
    const filled=TOOLS.filter(t=>db&&db[`tool_${t.id}`]&&db[`tool_${t.id}`].trim().length>0).length;
    const toolsCompletion=Math.round((filled/24)*100);
    const pTotal=projects.length;
    const pActive=projects.filter(p=>p.status==='active').length;
    const pDone=projects.filter(p=>p.status==='done').length;
    const pDraft=projects.filter(p=>p.status==='draft').length;
    const pPaused=projects.filter(p=>p.status==='paused').length;
    const riskKeywords=['risque','alerte','critique','blocage','retard','incident','vulnérabilité','faille'];
    let risks=0;
    TOOLS.forEach(t=>{const v=(db&&db[`tool_${t.id}`]||'').toLowerCase();
    if(riskKeywords.some(k=>v.includes(k)))risks++;});
    const projScore=pTotal>0?Math.min(100,(pDone/pTotal)*100+((pActive)/pTotal)*50):0;
    const actScore=Math.min(100,activityLog.length*2);
    const maturity=Math.round(toolsCompletion*0.5+projScore*0.3+actScore*0.2);
    const byRole={};
    activityLog.forEach(a=>{byRole[a.user_role]=(byRole[a.user_role]||0)+1;});
    return{filled,toolsCompletion,pTotal,pActive,pDone,pDraft,pPaused,risks,maturity,byRole,actScore};
}

function setPeriod(p,btn){
    currentPeriod=p;
    document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderKPI();

function renderKPI(){
    const kpi=computeKPI();
    const arc=document.getElementById('maturityArc');
    const circumference=314;
    const offset=circumference-(circumference*(kpi.maturity/100));
    arc.style.strokeDashoffset=offset;
    document.getElementById('maturityVal').textContent=kpi.maturity;
    let level,color;
    if(kpi.maturity>=80){level='🏆 Mature';color='#00B49C';}
    else if(kpi.maturity>=60){level='🚀 Avancé';color='#1A6CF5';}
    else if(kpi.maturity>=40){level='📈 En progression';color='#F5A623';}
    else if(kpi.maturity>=20){level='🌱 Débutant';color='#F97316';}
    else{level='⚠️ Initial';color='#E84568';}
    arc.style.stroke=color;
    const lvlEl=document.getElementById('maturityLevel');
    lvlEl.textContent=level;lvlEl.style.background=color+'33';lvlEl.style.color=color;
    const kpiData=[
        {label:'Outils complétés',value:`${kpi.filled}/24`,sub:`${kpi.toolsCompletion}% du diagnostic`,color:'#1A6CF5',pct:kpi.toolsCompletion},
        {label:'Score maturité SI',value:kpi.maturity,sub:level,color,pct:kpi.maturity},
        {label:'Projets actifs',value:kpi.pActive,sub:`${kpi.pTotal} projets au total`,color:'#22C55E',pct:kpi.pTotal>0?Math.round((kpi.pActive/kpi.pTotal)*100):0},
        {label:'Projets terminés',value:kpi.pDone,sub:`${kpi.pDone} sur ${kpi.pTotal}`,color:'#00B49C',pct:kpi.pTotal>0?Math.round((kpi.pDone/kpi.pTotal)*100):0},
        {label:'Risques détectés',value:kpi.risks,sub:'Outils signalant un risque',color:'#E84568',pct:Math.round((kpi.risks/24)*100)},
        {label:'Actions équipe',value:activityLog.length,sub:'Total contributions',color:'#7C5CFC',pct:Math.min(100,activityLog.length)},
    ];
    const grid=document.getElementById('kpiGrid');
    grid.innerHTML=kpiData.map(k=>`
        <div class="kpi-card" style="--kpi-color:${k.color}">
            <div class="kpi-label">${k.label}</div>
            <div class="kpi-value">${k.value}</div>
            <div class="kpi-sub">${k.sub}</div>
            <div class="kpi-bar-wrap"><div class="kpi-bar-fill" style="width:${k.pct}%"></div></div>
        </div>`).join('');
    renderCharts(kpi);
    renderActivityFeed();
    renderContributions();
    renderReportsList();
}

function renderCharts(kpi){
    Object.values(chartInstances).forEach(c=>{try{c.destroy();}catch(e){}});
    chartInstances={};
    Chart.defaults.font.family="'Instrument Sans', sans-serif";
    Chart.defaults.color='#666';
    const toolLabels=TOOLS.map(t=>t.t);
    const toolValues=TOOLS.map(t=>{const v=db&&db[`tool_${t.id}`]||'';return v.trim().length>0?100:0;});
    const toolColors=toolValues.map(v=>v>0?'#1A6CF5':'#E8EEFA');
    chartInstances.tools=new Chart(document.getElementById('chartTools'),{
        type:'bar',
        data:{labels:toolLabels,datasets:[{label:'Complété',data:toolValues,backgroundColor:toolColors,borderRadius:6,borderSkipped:false}]},
        options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
            plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.raw===100?'✓ Renseigné':'✗ Vide'}}},
            scales:{x:{max:100,display:false},y:{ticks:{font:{size:10}}}}}
    });
    const statusLabels=['Brouillon','En cours','En révision','Terminé','En pause'];
    const statusVals=[kpi.pDraft,kpi.pActive,projects.filter(p=>p.status==='review').length,kpi.pDone,kpi.pPaused];
    const statusColors=['#aaa','#22C55E','#1A6CF5','#00B49C','#F5A623'];
    chartInstances.projects=new Chart(document.getElementById('chartProjects'),{
        type:'doughnut',
        data:{labels:statusLabels,datasets:[{data:statusVals,backgroundColor:statusColors,borderWidth:0,hoverOffset:6}]},
        options:{responsive:true,maintainAspectRatio:false,cutout:'65%',
            plugins:{legend:{position:'bottom',labels:{padding:12,font:{size:11}}}}}
    });
    const trendLabels=kpiSnapshots.length>0?kpiSnapshots.slice().reverse().map(s=>fmtDate(s.snapshot_date)):['Aujourd\'hui'];
    const trendData=kpiSnapshots.length>0?kpiSnapshots.slice().reverse().map(s=>s.maturity_score):[kpi.maturity];
    chartInstances.trend=new Chart(document.getElementById('chartTrend'),{
        type:'line',
        data:{labels:trendLabels,datasets:[{label:'Maturité SI',data:trendData,
            borderColor:'#1A6CF5',backgroundColor:'rgba(26,108,245,.08)',
            borderWidth:2.5,fill:true,tension:.4,pointRadius:4,pointBackgroundColor:'#1A6CF5'}]},
        options:{responsive:true,maintainAspectRatio:false,
            plugins:{legend:{display:false}},
            scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%'}},x:{ticks:{font:{size:10}}}}}
    });
    const roleEntries=Object.entries(kpi.byRole).sort((a,b)=>b[1]-a[1]);
    chartInstances.roles=new Chart(document.getElementById('chartRoles'),{
        type:'bar',
        data:{labels:roleEntries.map(([r])=>ROLE_LABELS[r]||r),
            datasets:[{label:'Actions',data:roleEntries.map(([,v])=>v),
            backgroundColor:roleEntries.map(([r])=>roleColor(r)+'CC'),borderRadius:8,borderSkipped:false}]},
        options:{responsive:true,maintainAspectRatio:false,
            plugins:{legend:{display:false}},
            scales:{y:{ticks:{stepSize:1}},x:{ticks:{font:{size:11}}}}}
    });
}

function renderActivityFeed(){
    const feed=document.getElementById('activityFeed');
    if(!activityLog.length){feed.innerHTML='<p style="color:#aaa;font-size:13px">Aucune activité enregistrée.</p>';return;}
    const typeConfig={tool_update:{ico:'✏️',color:'#1A6CF5'},project_create:{ico:'➕',color:'#00B49C'},project_update:{ico:'📝',color:'#7C5CFC'},project_delete:{ico:'🗑️',color:'#E84568'},user_add:{ico:'👤',color:'#F97316'}};
    feed.innerHTML=activityLog.slice(0,20).map(a=>{
        const cfg=typeConfig[a.action_type]||{ico:'•',color:'#888'};
        return`<div class="activity-item">
            <span class="activity-dot" style="background:${cfg.color}"></span>
            <div class="activity-text">
                <strong>${esc(a.user_name)}</strong> ${esc(a.detail||a.action_type)}
                ${a.target_name?`<span style="color:#aaa"> · ${esc(a.target_name)}</span>`:''}
            </div>
            <span class="activity-time">${fmtTime(a.created_at)}</span>
        </div>`;}).join('');
}

async function renderContributions(){

         <tr>

            <td style="color:#aaa">${u.last_active?fmtDate(u.last_active):'—'}</td>
         </tr>`).join('');
}

async function generateSnapshot(){
    const kpi=computeKPI();
    const byRole={};allUsers.forEach(u=>{byRole[u.role]=(byRole[u.role]||0)+1;});
    const snap={
        snapshot_date:new Date().toISOString().slice(0,10),
        period_type:currentPeriod,
        tools_filled:kpi.filled,tools_total:24,tools_completion:kpi.toolsCompletion,
        projects_total:kpi.pTotal,projects_active:kpi.pActive,projects_done:kpi.pDone,
        projects_paused:kpi.pPaused,projects_draft:kpi.pDraft,
        users_total:allUsers.length,users_by_role:byRole,
        maturity_score:kpi.maturity,risks_detected:kpi.risks,
        tools_snapshot:db||{},
        projects_snapshot:projects,
        created_by:user.email
    };
    const{data,error}=await sb.from('ea_kpi_snapshots').insert(snap).select().single();
    if(error){showToast('❌ Erreur snapshot : '+error.message,'error');return;}
    kpiSnapshots.unshift(data);
    showToast('📸 Snapshot KPI sauvegardé !');
    renderKPI();
}

async function generateReport(){
    const kpi=computeKPI();
    const now=new Date();
    const isWeekly=currentPeriod==='weekly';
    const title=isWeekly
        ?`Rapport hebdomadaire — semaine ${now.toLocaleDateString('fr-FR')}`
        :`Rapport mensuel — ${now.toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}`;
    const summary=`Score de maturité SI : ${kpi.maturity}/100 (${kpi.filled}/24 outils renseignés, ${kpi.pActive} projets actifs, ${kpi.risks} risques détectés). ${activityLog.length} actions réalisées par l'équipe.`;
    const{data:snap}=await sb.from('ea_kpi_snapshots').select('id').order('created_at',{ascending:false}).limit(1).single();
    const report={title,period_type:isWeekly?'weekly':'monthly',
        period_start:now.toISOString().slice(0,10),
        period_end:now.toISOString().slice(0,10),
        generated_by:user.email,
        snapshot_id:snap?.id||null,
        kpi_data:{...kpi,generated_at:now.toISOString()},
        summary};
    const{data,error}=await sb.from('ea_reports').insert(report).select().single();
    if(error){showToast('❌ Erreur rapport : '+error.message,'error');return;}
    reports.unshift(data);showToast('📋 Rapport généré et sauvegardé !');renderReportsList();
}

function renderReportsList(){
    const list=document.getElementById('reportsList');
    if(!reports.length){list.innerHTML='<p style="color:#aaa;font-size:13px">Aucun rapport. Cliquez sur "Générer rapport" pour créer le premier.</p>';return;}
    list.innerHTML=reports.map(r=>`
        <div class="report-item">
            <span class="report-icon">${r.period_type==='monthly'?'📅':'📋'}</span>
            <div class="report-info">
                <div class="report-title">${esc(r.title)}</div>
                <div class="report-meta">
                    Généré le ${fmtDate(r.created_at)} · par ${esc(r.generated_by)}
                    · Score maturité : <strong>${r.kpi_data?.maturity||'—'}/100</strong>
                </div>
                ${r.summary?`<div style="font-size:12px;color:#666;margin-top:4px">${esc(r.summary)}</div>`:''}
            </div>
            <div class="report-actions">
                <button class="btn btn-sm btn-outline" onclick="exportReportPDF('${r.id}')">📄 PDF</button>
            </div>
        </div>`).join('');
}

function exportReportPDF(id){

    const html=`<div style="font-family:sans-serif;padding:32px;max-width:900px;margin:0 auto">
        <h1 style="font-size:24px;margin-bottom:4px">${esc(r.title)}</h1>
        <p style="color:#888;font-size:13px;margin-bottom:24px">Généré le ${fmtDate(r.created_at)} · par ${esc(r.generated_by)}</p>
        <div style="background:#0B1829;color:#fff;border-radius:16px;padding:24px;margin-bottom:24px">
            <h2 style="font-size:32px;margin-bottom:4px">${kd.maturity||0}<span style="font-size:16px;opacity:.6">/100</span></h2>
            <p style="opacity:.7">Score de Maturité SI</p>
        </div>
        <table style="width:100%;border-collapse:collapse">
            <tr style="background:#F0F4FA"><th style="padding:12px;text-align:left">KPI</th><th style="padding:12px;text-align:right">Valeur</th></tr>
            <tr><td style="padding:12px;border-bottom:1px solid #eee">Outils complétés</td><td style="padding:12px;border-bottom:1px solid #eee;text-align:right"><strong>${kd.filled||0}/24 (${kd.toolsCompletion||0}%)</strong></td></tr>
            <tr><td style="padding:12px;border-bottom:1px solid #eee">Projets totaux</td><td style="padding:12px;border-bottom:1px solid #eee;text-align:right"><strong>${kd.pTotal||0}</strong></td></tr>
            <tr><td style="padding:12px;border-bottom:1px solid #eee">Projets actifs</td><td style="padding:12px;border-bottom:1px solid #eee;text-align:right"><strong>${kd.pActive||0}</strong></td></tr>
            <tr><td style="padding:12px;border-bottom:1px solid #eee">Projets terminés</td><td style="padding:12px;border-bottom:1px solid #eee;text-align:right"><strong>${kd.pDone||0}</strong></td></tr>
            <tr><td style="padding:12px;border-bottom:1px solid #eee">Risques détectés</td><td style="padding:12px;border-bottom:1px solid #eee;text-align:right"><strong>${kd.risks||0}</strong></td></tr>
            <tr><td style="padding:12px">Actions équipe</td><td style="padding:12px;text-align:right"><strong>${activityLog.length}</strong></td></tr>
        </table>
        ${r.summary?`<div style="margin-top:24px;padding:16px;background:#F8FAFF;border-radius:12px;font-size:13px;line-height:1.6">${esc(r.summary)}</div>`:''}

        .then(()=>{document.body.removeChild(el);showToast('✅ Rapport PDF exporté !');})

function renderProjects(){
    const grid=document.getElementById('projectsGrid');
    if(!projects.length){grid.innerHTML='<p style="color:#aaa;font-size:14px;margin-top:4px">Aucun projet. Créez-en un ou importez un fichier Word.</p>';return;}
    grid.innerHTML='';
    projects.forEach(p=>{
        const sc=STATUS_CFG[p.status]||STATUS_CFG.draft;
        const card=document.createElement('div');card.className='proj-card';
        card.innerHTML=`<div class="proj-card-header">
            <div class="proj-title">${esc(p.title||'Sans titre')}</div>
            <span class="role-badge" style="${roleBadge(p.owner_role||'ADMIN')}">${ROLE_LABELS[p.owner_role]||p.owner_role||''}</span></div>
            <div class="proj-meta">
                <span style="display:flex;align-items:center;gap:5px">
                    <span class="status-dot" style="background:${sc.color}"></span>
                    <span style="color:${sc.color};font-weight:600">${sc.label}</span></span>
                <span>👤 ${esc(p.owner_name||'—')}</span>
                <span>📅 ${fmtDate(p.created_at)}</span></div>
            <div class="proj-content">${esc((p.content||'').substring(0,200))}</div>
            <div class="proj-actions">
                <button class="btn btn-sm btn-outline" onclick="editProject('${p.id}')">✏️ Modifier</button>
                ${user.role==='ADMIN'?`<button class="btn btn-sm btn-danger" onclick="deleteProject('${p.id}')">🗑️</button>`:''}
            </div>`;
        grid.appendChild(card);
    });
}
function openNewProject(){
    editingProjectId=null;
    document.getElementById('modalTitle').textContent='Nouveau projet';
    document.getElementById('pTitle').value='';
    document.getElementById('pStatus').value='draft';
    document.getElementById('pContent').value='';
    document.getElementById('wordPreviewZone').innerHTML='';
    populateOwnerSelect();
    document.getElementById('projectModal').classList.add('open');
}
function editProject(id){
    const p=projects.find(x=>x.id===id);if(!p)return;
    editingProjectId=id;
    document.getElementById('modalTitle').textContent='Modifier le projet';
    document.getElementById('pTitle').value=p.title||'';
    document.getElementById('pStatus').value=p.status||'draft';
    document.getElementById('pContent').value=p.content||'';
    document.getElementById('wordPreviewZone').innerHTML='';
    populateOwnerSelect(p.owner_email);
    document.getElementById('projectModal').classList.add('open');
}
function closeModal(){document.getElementById('projectModal').classList.remove('open');editingProjectId=null;}
function populateOwnerSelect(selectedEmail){
    const sel=document.getElementById('pOwner');sel.innerHTML='';
    const opts=allUsers.length?allUsers:[user];
    opts.forEach(u=>{const opt=document.createElement('option');
    opt.value=u.email;opt.textContent=`${u.nom} (${ROLE_LABELS[u.role]||u.role})`;
    opt.dataset.role=u.role;opt.dataset.name=u.nom;
    if(u.email===(selectedEmail||user.email))opt.selected=true;
    sel.appendChild(opt);});
}
async function saveProject(){
    const title=document.getElementById('pTitle').value.trim();
    const status=document.getElementById('pStatus').value;
    const content=document.getElementById('pContent').value.trim();
    const ownerSel=document.getElementById('pOwner');
    const ownerOpt=ownerSel.options[ownerSel.selectedIndex];
    if(!title){showToast('⚠️ Titre obligatoire','error');return;}
    const btn=document.getElementById('saveProjectBtn');
    btn.disabled=true;btn.textContent='Enregistrement…';
    const payload={title,status,content,owner_email:ownerSel.value,
        owner_name:ownerOpt?ownerOpt.dataset.name:user.nom,
        owner_role:ownerOpt?ownerOpt.dataset.role:user.role,
        updated_at:new Date().toISOString()};
    let error;
    if(editingProjectId){
        ({error}=await sb.from('ea_projects').update(payload).eq('id',editingProjectId));
        if(!error){const i=projects.findIndex(p=>p.id===editingProjectId);if(i>=0)projects[i]={...projects[i],...payload};}
        await logActivity('project_update',editingProjectId,title,'Projet modifié');
    }else{
        const{data,error:e}=await sb.from('ea_projects').insert(payload).select().single();
        error=e;if(!error&&data)projects.unshift(data);
        await logActivity('project_create',data?.id||'',title,'Nouveau projet créé');
    }
    btn.disabled=false;btn.textContent='💾 Enregistrer';
    if(error){showToast('❌ Erreur : '+error.message,'error');}
    else{showToast('✅ Projet enregistré !');closeModal();renderProjects();}
}
async function deleteProject(id){
    if(!confirm('Supprimer ce projet définitivement ?'))return;
    const p=projects.find(x=>x.id===id);
    const{error}=await sb.from('ea_projects').delete().eq('id',id);
    if(!error){projects=projects.filter(p=>p.id!==id);renderProjects();
    await logActivity('project_delete',id,p?.title||'','Projet supprimé');
    showToast('🗑️ Projet supprimé');}
    else showToast('❌ Erreur suppression','error');
}

// ── Import Word ──
function handleDrop(e){e.preventDefault();document.getElementById('uploadZone').classList.remove('drag');const f=e.dataTransfer.files[0];if(f)processWordFile(f);}
function importWord(e){const f=e.target.files[0];if(f)processWordFile(f);e.target.value='';}
function processWordFile(file){
    if(!file.name.match(/\.docx?$/i)){showToast('⚠️ Format .docx requis','error');return;}
    showToast('📄 Lecture du fichier Word…');
    const reader=new FileReader();
    reader.onload=async(e)=>{
        try{const result=await mammoth.extractRawText({arrayBuffer:e.target.result});
        const text=result.value.trim();
        editingProjectId=null;
        document.getElementById('modalTitle').textContent='📄 Projet importé depuis Word';
        document.getElementById('pTitle').value=file.name.replace(/\.docx?$/i,'');
        document.getElementById('pStatus').value='draft';
        document.getElementById('pContent').value=text;
        document.getElementById('wordPreviewZone').innerHTML=`<div class="word-preview">
            <strong style="font-size:11px;color:#888;display:block;margin-bottom:8px">APERÇU</strong>
            ${esc(text.substring(0,400)).replace(/\n/g,'<br>')}${text.length>400?'…':''}</div>`;
        populateOwnerSelect();document.getElementById('projectModal').classList.add('open');
        showToast('✅ Document Word importé !');
        }catch(err){showToast('❌ Impossible de lire ce fichier Word','error');}
    };reader.readAsArrayBuffer(file);
}

async function loadAllUsers(){
    const{data}=await sb.from('ea_users').select('*').order('created_at');
    allUsers=data||[];renderUsersList();
}
function renderUsersList(){
    const list=document.getElementById('usersList');
    const count=document.getElementById('userCount');
    count.textContent=`(${allUsers.length})`;
    if(!allUsers.length){list.innerHTML='<p style="color:#aaa;font-size:13px">Aucun utilisateur</p>';return;}
    list.innerHTML=allUsers.map(u=>`<div class="user-item">
        <div class="user-avatar" style="background:${roleColor(u.role)}">${(u.nom||'?').charAt(0).toUpperCase()}</div>
        <div class="user-info"><div class="user-name">${esc(u.nom)}</div><div class="user-email">${esc(u.email)}</div></div>
        <span class="role-badge" style="${roleBadge(u.role)}">${ROLE_LABELS[u.role]||u.role}</span>
    </div>`).join('');
}
async function addUser(){
    if(!user||user.role!=='ADMIN'){showToast('❌ Accès refusé','error');return;}
    const email=document.getElementById('newEmail').value.trim();
    const nom=document.getElementById('newN').value.trim();
    const role=document.getElementById('newR').value;
    if(!email||!nom){showToast('⚠️ Email et nom obligatoires','error');return;}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showToast('⚠️ Format email invalide','error');return;}
    const{error}=await sb.from('ea_users').insert({email,nom,role});
    if(error){showToast('❌ '+error.message,'error');}
    else{showToast(`✅ ${nom} (${ROLE_LABELS[role]}) créé !`);
    document.getElementById('newEmail').value='';document.getElementById('newN').value='';
    await loadAllUsers();await logActivity('user_add','',nom,`Nouvel utilisateur ${role} ajouté`);}
}

async function isSuperAdmin() {
    const { data: { user } } = await sb.auth.getUser();
    return user?.user_metadata?.role === 'super_admin';
}

(async () => {
    if (await isSuperAdmin()) {
        const adminSection = document.getElementById('adminCreateUserSection');
        if (adminSection) {
            adminSection.style.display = 'block';
            loadSecurityQuestions();
            generateCaptcha();
        }
    }
})();

async function loadSecurityQuestions() {
    try {
        const response = await fetch('/api/security-questions');
        const questions = await response.json();
        const container = document.getElementById('securityQuestionsContainer');
        if (!container) return;
        container.innerHTML = '';

        for (let i = 0; i < 2; i++) {
            const select = document.createElement('select');
            select.id = `question_${i}`;
            select.required = true;
            questions.forEach(q => {
                const option = document.createElement('option');
                option.value = q.id;
                option.textContent = q.question_text;
                select.appendChild(option);
            });
            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = 'Votre réponse';
            input.id = `answer_${i}`;
            input.required = true;

            container.appendChild(document.createTextNode(`Question ${i+1} :`));
            container.appendChild(select);
            container.appendChild(input);
            container.appendChild(document.createElement('br'));
        }
    } catch (error) {
        console.error('Erreur chargement questions:', error);
    }
}

let currentCaptchaAnswer = 0;
function generateCaptcha() {
    const a = Math.floor(Math.random() * 10);
    const b = Math.floor(Math.random() * 10);
    currentCaptchaAnswer = a + b;
    const container = document.getElementById('captchaContainer');
    if (container) {
        container.innerHTML = `
            <label>Vérification anti-spam : ${a} + ${b} = ?</label>
            <input type="number" id="captchaInput" required>
        `;
    }
}

document.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('createUserForm');
    if (form) {
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const captchaInput = document.getElementById('captchaInput');
            if (!captchaInput || parseInt(captchaInput.value) !== currentCaptchaAnswer) {
                document.getElementById('createUserMessage').innerText = 'Réponse anti-spam incorrecte';
                generateCaptcha();
                return;
            }

            const securityAnswers = [];
            for (let i = 0; i < 2; i++) {
                const questionId = document.getElementById(`question_${i}`).value;
                const answer = document.getElementById(`answer_${i}`).value;
                securityAnswers.push({ questionId: parseInt(questionId), answer });
            }

            const userData = {
                email: document.getElementById('newUserEmail').value,
                password: document.getElementById('newUserPassword').value,
                userType: document.getElementById('newUserType').value,
                securityAnswers
            };

            const { data: { session } } = await sb.auth.getSession();
            const token = session?.access_token;

            const response = await fetch('/api/create-user', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(userData)
            });

            const result = await response.json();
            const messageDiv = document.getElementById('createUserMessage');
            if (response.ok) {
                messageDiv.innerText = 'Utilisateur créé avec succès !';
                messageDiv.style.color = 'green';
                form.reset();
                generateCaptcha();
            } else {
                messageDiv.innerText = `Erreur : ${result.error}`;
                messageDiv.style.color = 'red';
            }
        });
    }
});
