<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SI Governance Enterprise | v5.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Instrument Sans',sans-serif;background:#F0F4FA;color:#0B1829;}
        .screen{display:none;min-height:100vh;}
        .screen.active{display:block;}
        #authScreen{background:#0B1829;color:#fff;display:flex;align-items:center;justify-content:center;}
        .auth-card{background:rgba(255,255,255,.06);border-radius:28px;padding:44px 40px;text-align:center;max-width:420px;margin:20px;}
        .auth-card h2{font-family:'Syne';font-size:26px;}
        .login-form input{width:100%;padding:13px;margin-bottom:12px;border-radius:12px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;}
        .btn-login{width:100%;padding:14px;background:#1A6CF5;color:#fff;border:none;border-radius:12px;font-weight:700;cursor:pointer;}
        .topbar{background:#fff;padding:0 28px;height:66px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;width:100%;z-index:100;border-bottom:1px solid rgba(0,0,0,.08);}
        .container{padding:86px 28px 48px;max-width:1440px;margin:0 auto;}
        .s-hide{display:none!important;}
        .btn{padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-weight:700;background:#1A6CF5;color:#fff;}
        .views-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px;}
        .vp-card{background:#fff;border-radius:16px;padding:22px;border-top:5px solid #1A6CF5;}
        .vp-notes{width:100%;border:1px solid #eee;border-radius:9px;padding:10px;min-height:80px;font-family:inherit;}
        .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:28px;}
        .kpi-card{background:#fff;border-radius:16px;padding:22px;border:1px solid rgba(0,0,0,.08);}
        .kpi-value{font-family:'Syne';font-size:32px;font-weight:800;}
        .projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;}
        .proj-card{background:#fff;border-radius:16px;padding:24px;border:1px solid rgba(0,0,0,.08);}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:1000;}
        .modal-overlay.open{display:flex;}
        .modal{background:#fff;border-radius:20px;padding:32px;max-width:640px;width:90%;max-height:90vh;overflow:auto;}
        #toast{position:fixed;bottom:28px;right:28px;background:#0B1829;color:#fff;padding:12px 20px;border-radius:12px;opacity:0;transition:all .3s;pointer-events:none;}
        #toast.show{opacity:1;}
    </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div class="screen active" id="authScreen">
    <div class="auth-card">
        <h2>SI Governance · v5.0</h2>
        <p style="margin:16px 0;opacity:.7;">Connectez-vous pour accéder à la plateforme</p>
        <div id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email professionnel">
            <input type="password" id="loginPassword" placeholder="Mot de passe">
            <button class="btn-login" onclick="doLogin()">Se connecter</button>
        </div>
        <div id="debugZone" style="color:#ff8fad;font-size:12px;margin-top:16px;display:none;"></div>
    </div>
</div>

<!-- APP SCREEN -->
<div class="screen" id="appScreen">
    <div class="topbar">
        <div><strong>SI MANAGER</strong></div>
        <div>
            <button class="nav-btn" onclick="tab('diag')">📊 Diagnostic</button>
            <button class="nav-btn" onclick="tab('kpi')">📈 KPI</button>
            <button class="nav-btn" onclick="tab('projects')">📁 Projets</button>
            <button class="nav-btn" id="navAdmin" onclick="tab('admin')" style="display:none">🔑 Admin</button>
            <button onclick="doLogout()" style="margin-left:16px;padding:8px 16px;background:#E84568;color:#fff;border:none;border-radius:8px;">Déconnexion</button>
        </div>
    </div>

    <!-- DIAGNOSTIC -->
    <div id="diagSection" class="container">
        <h1>Dashboard des 24 Outils</h1>
        <div id="mainContainer" class="views-grid"></div>
    </div>

    <!-- KPI -->
    <div id="kpiSection" class="container s-hide">
        <h1>KPI & Rapports</h1>
        <div class="kpi-grid" id="kpiGrid"></div>
        <div id="reportsList"></div>
    </div>

    <!-- PROJETS -->
    <div id="projectsSection" class="container s-hide">
        <h1>Projets SI</h1>
        <button class="btn" onclick="openNewProject()">➕ Nouveau projet</button>
        <div id="projectsGrid" class="projects-grid" style="margin-top:24px;"></div>
    </div>

    <!-- ADMIN -->
    <div id="adminSection" class="container s-hide">
        <h1>Administration</h1>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
            <div style="background:#fff;padding:24px;border-radius:16px;">
                <h3>➕ Ajouter un Expert SI</h3>
                <input type="email" id="newEmail" placeholder="Email" style="width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ddd;">
                <input type="text" id="newName" placeholder="Nom" style="width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ddd;">
                <select id="newRole" style="width:100%;padding:12px;margin:8px 0;border-radius:8px;">
                    <option value="ADMIN">Super Admin</option><option value="DSI">DSI</option><option value="RSSI">RSSI</option><option value="DATA">Expert Data</option>
                </select>
                <button class="btn" onclick="addUser()" style="width:100%">Créer</button>
            </div>
            <div style="background:#fff;padding:24px;border-radius:16px;">
                <h3>👥 Équipe SI</h3>
                <div id="usersList">Chargement...</div>
            </div>
        </div>
        
        <!-- Formulaire création utilisateur avec questions sécurité -->
        <div id="adminCreateUserSection" style="display:none; margin-top:32px; background:#fff; padding:24px; border-radius:16px;">
            <h3>Créer un nouvel utilisateur (avec questions sécurité)</h3>
            <form id="createUserForm">
                <input type="email" id="newUserEmail" placeholder="Email" required style="width:100%;padding:10px;margin:8px 0;"><br>
                <input type="password" id="newUserPassword" placeholder="Mot de passe" required style="width:100%;padding:10px;margin:8px 0;"><br>
                <select id="newUserType" style="width:100%;padding:10px;margin:8px 0;">
                    <option value="RSSI">RSSI (Rose)</option><option value="DSI">DSI (Violet)</option><option value="DATA">DATA (Teal)</option>
                </select><br>
                <div id="securityQuestionsContainer"></div>
                <div id="captchaContainer"></div>
                <button type="submit" class="btn" style="margin-top:16px;">Créer l'utilisateur</button>
            </form>
            <div id="createUserMessage"></div>
        </div>
    </div>
</div>

<!-- MODAL PROJET -->
<div class="modal-overlay" id="projectModal">
    <div class="modal">
        <h3 id="modalTitle">Nouveau projet</h3>
        <input type="text" id="pTitle" placeholder="Titre" style="width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ddd;">
        <select id="pStatus" style="width:100%;padding:12px;margin:8px 0;">
            <option value="draft">Brouillon</option><option value="active">En cours</option><option value="done">Terminé</option>
        </select>
        <textarea id="pContent" placeholder="Description" style="width:100%;padding:12px;margin:8px 0;min-height:120px;"></textarea>
        <div style="display:flex;gap:12px;justify-content:flex-end;">
            <button onclick="closeModal()" class="btn" style="background:#ccc;">Annuler</button>
            <button onclick="saveProject()" class="btn">Enregistrer</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
// CONFIGURATION
const SUPABASE_URL = 'https://rkaymdbyfbmfiutwbjtx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_7W-CJaPMGcuVRS5iy0Zx-w_y_KkiGrH';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null, projects = [], allUsers = [], db = {};
let editingProjectId = null;

// UTILS
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}
function setScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
function tab(which) {
    ['diag', 'kpi', 'projects', 'admin'].forEach(s => {
        document.getElementById(s + 'Section').classList.toggle('s-hide', s !== which);
    });
    if (which === 'kpi') renderKPI();
    if (which === 'admin') loadAllUsers();
}
function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

// AUTH
async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pwd = document.getElementById('loginPassword').value;
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
    if (error) {
        document.getElementById('debugZone').style.display = 'block';
        document.getElementById('debugZone').textContent = error.message;
        return;
    }
    await loadUserProfile(data.user.email);
}
async function doLogout() {
    await sb.auth.signOut();
    user = null;
    setScreen('authScreen');
}
async function loadUserProfile(email) {
    const { data: profile } = await sb.from('ea_users').select('*').eq('email', email).single();
    if (!profile) {
        const { count } = await sb.from('ea_users').select('*', { count: 'exact', head: true });
        if (count === 0) {
            await sb.from('ea_users').insert({ email, nom: email.split('@')[0], role: 'ADMIN' });
            return loadUserProfile(email);
        }
        await sb.auth.signOut();
        setScreen('authScreen');
        return;
    }
    user = profile;
    document.getElementById('navAdmin').style.display = user.role === 'ADMIN' ? 'inline-block' : 'none';
    const { data: row } = await sb.from('ea_platform_data').select('content').eq('id', 1).single();
    db = row?.content || {};
    const { data: projs } = await sb.from('ea_projects').select('*').order('created_at', { ascending: false });
    projects = projs || [];
    const { data: users } = await sb.from('ea_users').select('*');
    allUsers = users || [];
    setScreen('appScreen');
    tab('diag');
    renderTools();
    renderProjects();
    
    // Afficher la section création utilisateur si Super Admin
    if (user.role === 'ADMIN') {
        document.getElementById('adminCreateUserSection').style.display = 'block';
        loadSecurityQuestions();
        generateCaptcha();
    }
}

// TOOLS
const TOOLS = [
    { id: 1, t: "Capacités Métier" }, { id: 2, t: "Transformation IT" }, { id: 3, t: "Objectifs Strat" },
    { id: 4, t: "Écosystème" }, { id: 5, t: "Portefeuille App" }, { id: 6, t: "Flux & Interfaces" },
    { id: 7, t: "Mapping Cap/App" }, { id: 8, t: "Obsolescence" }, { id: 9, t: "Données Métier" },
    { id: 10, t: "Lineage Data" }, { id: 11, t: "RGPD" }, { id: 12, t: "Analytique" },
    { id: 13, t: "Infrastructure" }, { id: 14, t: "Sécurité SI" }, { id: 15, t: "Standards" },
    { id: 16, t: "Cloud Arch" }, { id: 17, t: "Processus" }, { id: 18, t: "Parties Prenantes" },
    { id: 19, t: "Gouvernance" }, { id: 20, t: "Risques SI" }, { id: 21, t: "Roadmap SI" },
    { id: 22, t: "Impact Projets" }, { id: 23, t: "Coût IT" }, { id: 24, t: "Innovation" }
];
function renderTools() {
    const grid = document.getElementById('mainContainer');
    grid.innerHTML = '';
    TOOLS.forEach(tool => {
        const val = db[`tool_${tool.id}`] || '';
        const card = document.createElement('div');
        card.className = 'vp-card';
        card.innerHTML = `
            <div><strong>${tool.t}</strong></div>
            <textarea class="vp-notes" id="note_${tool.id}" placeholder="Notes...">${val}</textarea>
            <div id="saved_${tool.id}" style="font-size:11px;color:#00B49C;display:none;">✓ Sauvegardé</div>
        `;
        grid.appendChild(card);
        const ta = card.querySelector(`#note_${tool.id}`);
        let deb;
        ta.addEventListener('input', () => {
            clearTimeout(deb);
            deb = setTimeout(() => saveNote(tool.id, ta.value), 700);
        });
    });
}
async function saveNote(id, value) {
    db[`tool_${id}`] = value;
    await sb.from('ea_platform_data').upsert({ id: 1, content: db }, { onConflict: 'id' });
    const el = document.getElementById(`saved_${id}`);
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 2000);
}

// KPI
function computeKPI() {
    const filled = TOOLS.filter(t => db[`tool_${t.id}`] && db[`tool_${t.id}`].trim().length > 0).length;
    const toolsCompletion = Math.round((filled / 24) * 100);
    const pTotal = projects.length;
    const pActive = projects.filter(p => p.status === 'active').length;
    const pDone = projects.filter(p => p.status === 'done').length;
    const maturity = Math.round(toolsCompletion * 0.6 + (pActive / (pTotal || 1)) * 40);
    return { filled, toolsCompletion, pTotal, pActive, pDone, maturity };
}
function renderKPI() {
    const kpi = computeKPI();
    const grid = document.getElementById('kpiGrid');
    grid.innerHTML = `
        <div class="kpi-card"><div class="kpi-label">Outils complétés</div><div class="kpi-value">${kpi.filled}/24</div><div>${kpi.toolsCompletion}%</div></div>
        <div class="kpi-card"><div class="kpi-label">Score maturité</div><div class="kpi-value">${kpi.maturity}</div><div>/100</div></div>
        <div class="kpi-card"><div class="kpi-label">Projets actifs</div><div class="kpi-value">${kpi.pActive}</div><div>sur ${kpi.pTotal}</div></div>
        <div class="kpi-card"><div class="kpi-label">Projets terminés</div><div class="kpi-value">${kpi.pDone}</div><div>terminés</div></div>
    `;
}

// PROJETS
function renderProjects() {
    const grid = document.getElementById('projectsGrid');
    if (!projects.length) { grid.innerHTML = '<p>Aucun projet</p>'; return; }
    grid.innerHTML = projects.map(p => `
        <div class="proj-card">
            <h3>${esc(p.title)}</h3>
            <p>${esc((p.content || '').substring(0, 100))}</p>
            <button class="btn" style="margin-top:12px;" onclick="editProject('${p.id}')">Modifier</button>
        </div>
    `).join('');
}
function openNewProject() {
    editingProjectId = null;
    document.getElementById('pTitle').value = '';
    document.getElementById('pStatus').value = 'draft';
    document.getElementById('pContent').value = '';
    document.getElementById('projectModal').classList.add('open');
}
function editProject(id) {
    const p = projects.find(x => x.id === id);
    if (!p) return;
    editingProjectId = id;
    document.getElementById('pTitle').value = p.title || '';
    document.getElementById('pStatus').value = p.status || 'draft';
    document.getElementById('pContent').value = p.content || '';
    document.getElementById('projectModal').classList.add('open');
}
function closeModal() {
    document.getElementById('projectModal').classList.remove('open');
    editingProjectId = null;
}
async function saveProject() {
    const title = document.getElementById('pTitle').value.trim();
    const status = document.getElementById('pStatus').value;
    const content = document.getElementById('pContent').value.trim();
    if (!title) { showToast('Titre requis'); return; }
    const payload = { title, status, content, owner_email: user.email, owner_name: user.nom, owner_role: user.role, updated_at: new Date().toISOString() };
    if (editingProjectId) {
        await sb.from('ea_projects').update(payload).eq('id', editingProjectId);
        const idx = projects.findIndex(p => p.id === editingProjectId);
        if (idx >= 0) projects[idx] = { ...projects[idx], ...payload };
    } else {
        const { data } = await sb.from('ea_projects').insert(payload).select().single();
        if (data) projects.unshift(data);
    }
    closeModal();
    renderProjects();
    showToast('Projet enregistré');
}

// ADMIN USERS
async function loadAllUsers() {
    const { data } = await sb.from('ea_users').select('*');
    allUsers = data || [];
    const list = document.getElementById('usersList');
    if (!allUsers.length) { list.innerHTML = '<p>Aucun utilisateur</p>'; return; }
    list.innerHTML = allUsers.map(u => `<div style="padding:8px;border-bottom:1px solid #eee;"><strong>${esc(u.nom)}</strong> (${u.role})<br><small>${esc(u.email)}</small></div>`).join('');
}
async function addUser() {
    const email = document.getElementById('newEmail').value.trim();
    const nom = document.getElementById('newName').value.trim();
    const role = document.getElementById('newRole').value;
    if (!email || !nom) { showToast('Email et nom requis'); return; }
    const { error } = await sb.from('ea_users').insert({ email, nom, role });
    if (error) showToast('Erreur: ' + error.message);
    else { showToast('Utilisateur créé'); document.getElementById('newEmail').value = ''; document.getElementById('newName').value = ''; loadAllUsers(); }
}

// NOUVELLES FONCTIONS POUR CRÉATION AVEC QUESTIONS SÉCURITÉ
async function loadSecurityQuestions() {
    try {
        const response = await fetch('/api/security-questions');
        if (!response.ok) throw new Error('API non disponible');
        const questions = await response.json();
        const container = document.getElementById('securityQuestionsContainer');
        if (!container) return;
        container.innerHTML = '';
        for (let i = 0; i < 2; i++) {
            const select = document.createElement('select');
            select.id = `question_${i}`;
            select.style.width = '100%';
            select.style.padding = '10px';
            select.style.margin = '8px 0';
            questions.forEach(q => {
                const opt = document.createElement('option');
                opt.value = q.id;
                opt.textContent = q.question_text;
                select.appendChild(opt);
            });
            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = 'Votre réponse';
            input.id = `answer_${i}`;
            input.style.width = '100%';
            input.style.padding = '10px';
            input.style.margin = '8px 0';
            container.appendChild(document.createTextNode(`Question ${i+1} :`));
            container.appendChild(select);
            container.appendChild(input);
        }
    } catch (error) {
        console.error('Erreur chargement questions:', error);
        document.getElementById('securityQuestionsContainer').innerHTML = '<p style="color:red;">⚠️ Questions non disponibles</p>';
    }
}

let currentCaptchaAnswer = 0;
function generateCaptcha() {
    const a = Math.floor(Math.random() * 10);
    const b = Math.floor(Math.random() * 10);
    currentCaptchaAnswer = a + b;
    const container = document.getElementById('captchaContainer');
    if (container) {
        container.innerHTML = `
            <label>Vérification anti-spam : ${a} + ${b} = ?</label>
            <input type="number" id="captchaInput" style="width:100%;padding:10px;margin:8px 0;" required>
        `;
    }
}

// Soumission formulaire
const form = document.getElementById('createUserForm');
if (form) {
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const captchaInput = document.getElementById('captchaInput');
        if (!captchaInput || parseInt(captchaInput.value) !== currentCaptchaAnswer) {
            document.getElementById('createUserMessage').innerHTML = '<span style="color:red;">Réponse anti-spam incorrecte</span>';
            generateCaptcha();
            return;
        }
        const securityAnswers = [];
        for (let i = 0; i < 2; i++) {
            const questionId = document.getElementById(`question_${i}`).value;
            const answer = document.getElementById(`answer_${i}`).value;
            securityAnswers.push({ questionId: parseInt(questionId), answer });
        }
        const userData = {
            email: document.getElementById('newUserEmail').value,
            password: document.getElementById('newUserPassword').value,
            userType: document.getElementById('newUserType').value,
            securityAnswers
        };
        try {
            const { data: { session } } = await sb.auth.getSession();
            const token = session?.access_token;
            const response = await fetch('/api/create-user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(userData)
            });
            const result = await response.json();
            const msgDiv = document.getElementById('createUserMessage');
            if (response.ok) {
                msgDiv.innerHTML = '<span style="color:green;">✅ Utilisateur créé avec succès !</span>';
                form.reset();
                generateCaptcha();
                loadAllUsers();
            } else {
                msgDiv.innerHTML = `<span style="color:red;">❌ Erreur : ${result.error}</span>`;
            }
        } catch(err) {
            document.getElementById('createUserMessage').innerHTML = `<span style="color:red;">❌ Erreur réseau : ${err.message}</span>`;
        }
    });
}

// INIT
function init() {
    // Rien de spécial, tout est géré par loadUserProfile après connexion
}
init();
</script>

</body>
</html>
