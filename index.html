<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Connexion SI Governance</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>Connexion</h2>
    <input type="email" id="email" placeholder="Email" value="test@example.com"><br>
    <input type="password" id="password" placeholder="Mot de passe"><br>
    <button onclick="login()">Se connecter</button>
    <pre id="result"></pre>

    <script>
        const SUPABASE_URL = 'https://rkaymdbyfbmfiutwbjtx.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_7W-CJaPMGcuVRS5iy0Zx-w_y_KkiGrH';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const result = document.getElementById('result');
            result.innerText = 'Connexion en cours...';
            
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                result.innerText = 'ERREUR : ' + error.message;
            } else {
                result.innerText = 'SUCCÈS ! Redirection...';
                setTimeout(() => { window.location.href = '/dashboard.html'; }, 1000);
            }
        }
    </script>
</body>
</html>
