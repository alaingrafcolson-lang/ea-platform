<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SI Governance | Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Instrument Sans', sans-serif;
            background: #F4F7FB;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
        }
        h1 {
            font-family: 'Syne';
            font-size: 28px;
            margin-bottom: 8px;
        }
        .sub {
            color: #6b7280;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 13px;
            color: #374151;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1.5px solid #e5e7eb;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.15s;
            outline: none;
        }
        input:focus {
            border-color: #1A6CF5;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            background: #1A6CF5;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }
        .info {
            margin-top: 24px;
            text-align: center;
            font-size: 13px;
            color: #6b7280;
        }
        a {
            color: #1A6CF5;
            text-decoration: none;
        }
        .password-hint {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h1>🔐 SI Governance</h1>
    <div class="sub">Connectez-vous à votre espace</div>

    <div id="errorMsg" class="error"></div>

    <div class="form-group">
        <label>Email professionnel</label>
        <input type="email" id="email" placeholder="prenom.nom@domaine.fr" value="alain.grafcolson@gmail.com">
    </div>
    <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••">
        <div class="password-hint">⚠️ 8 lettres, 2 caractères spéciaux, 4 chiffres, 1 majuscule minimum</div>
    </div>

    <button class="btn" onclick="handleLogin()">Se connecter</button>

    <div class="info">
        <a href="#" id="forgotLink">Mot de passe oublié ?</a> &nbsp;|&nbsp;
        <a href="#" id="signupLink">Créer un compte</a>
    </div>
</div>

<script>
    // ═══════════════════════════════════════════════════════════
    // CONFIGURATION SUPABASE (IDENTIQUE À ADMIN.HTML)
    // ═══════════════════════════════════════════════════════════
    const SUPABASE_URL = 'https://rkaymdbyfbmfiutwbjtx.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7W-CJaPMGcuVRS5iy0Zx-w_y_KkiGrH';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
        auth: { persistSession: true, autoRefreshToken: true }
    });

    async function handleLogin() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMsg');

        errorDiv.style.display = 'none';
        errorDiv.innerText = '';

        if (!email || !password) {
            errorDiv.innerText = 'Veuillez remplir tous les champs.';
            errorDiv.style.display = 'block';
            return;
        }

        // Tentative de connexion
        const { data, error } = await supabase.auth.signInWithPassword({
            email: email,
            password: password
        });

        if (error) {
            console.error('Erreur connexion:', error);
            errorDiv.innerText = error.message || 'Échec de connexion. Vérifiez vos identifiants.';
            errorDiv.style.display = 'block';
            return;
        }

        if (data?.session) {
            // Connexion réussie → redirection vers dashboard ou admin
            window.location.href = '/dashboard.html';
        } else {
            errorDiv.innerText = 'Réponse inattendue du serveur.';
            errorDiv.style.display = 'block';
        }
    }

    // Mot de passe oublié : envoie un email de réinitialisation
    document.getElementById('forgotLink').addEventListener('click', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        if (!email) {
            alert('Veuillez saisir votre email.');
            return;
        }
        const { error } = await supabase.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin + '/index.html'
        });
        if (error) {
            alert('Erreur : ' + error.message);
        } else {
            alert('Un lien de réinitialisation vous a été envoyé par email.');
        }
    });

    // Créer un compte (redirige vers la page d'inscription si elle existe)
    document.getElementById('signupLink').addEventListener('click', (e) => {
        e.preventDefault();
        // Si vous avez une page signup.html, décommentez :
        // window.location.href = '/signup.html';
        alert('Pour créer un compte, contactez votre administrateur ou utilisez l\'invitation.');
    });
</script>
</body>
</html>
