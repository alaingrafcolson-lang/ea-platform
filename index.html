<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SI Governance Enterprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Instrument+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --navy:#0B1829; --blue:#1A6CF5; --violet:#7C5CFC; --rose:#E84568; --teal:#00B49C; --u-color: var(--blue); }
        body { font-family:'Instrument Sans', sans-serif; background:#F4F7FB; margin:0; color:var(--navy); }
        .screen { display:none; min-height:100vh; flex-direction:column; align-items:center; justify-content:center; }
        .screen.active { display:flex; }
        #authScreen { background:var(--navy); color:#fff; }
        .auth-card { width:400px; padding:40px; background:rgba(255,255,255,0.05); border-radius:30px; backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.1); text-align:center; }
        .topbar { background:#fff; padding:0 32px; height:70px; display:flex; align-items:center; justify-content:space-between; width:100%; border-bottom:1px solid rgba(0,0,0,0.1); position:fixed; top:0; z-index:100; box-sizing:border-box; }
        .container { padding:100px 32px 40px; max-width:1400px; width:100%; box-sizing:border-box; margin:0 auto; }
        .views-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:20px; }
        .vp-card { background:#fff; border-radius:16px; padding:24px; border-top:6px solid var(--u-color); box-shadow:0 4px 15px rgba(0,0,0,0.05); }
        .btn { padding:12px 24px; border-radius:12px; border:none; cursor:pointer; font-weight:700; background:var(--u-color); color:#fff; }
        input, select { padding:12px; border-radius:10px; border:1px solid #ddd; width:100%; margin-bottom:15px; font-family:inherit; }
    </style>
</head>
<body>

<div class="screen active" id="authScreen">
    <div class="auth-card">
        <h2 id="stTitle" style="font-family:'Syne'">Connexion Cloud...</h2>
        <div id="authActions"></div>
    </div>
</div>

<div class="screen" id="appScreen" style="justify-content:flex-start;">
    <div class="topbar">
        <div style="display:flex; align-items:center; gap:15px;">
            <div id="uAvatar" style="width:35px; height:35px; border-radius:10px; background:var(--u-color); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800;"></div>
            <span style="font-family:'Syne'; font-weight:800; font-size:18px;">SI MANAGER</span>
        </div>
        <div>
            <button class="btn" style="background:none; color:var(--navy);" onclick="tab('diag')">Diagnostic</button>
            <button class="btn" id="admLink" style="display:none; background:none; color:var(--navy);" onclick="tab('admin')">🔑 Admin</button>
            <button class="btn" style="background:var(--rose); font-size:11px;" onclick="location.reload()">Quitter</button>
        </div>
    </div>
    <div id="diagSection" class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h1 style="font-family:'Syne'; margin:0;">Dashboard Gouvernance</h1>
            <button class="btn" onclick="exportPDF()" style="background:var(--navy)">📊 Rapport PDF</button>
        </div>
        <div id="mainContainer" class="views-grid"></div>
    </div>
    <div id="adminSection" class="container" style="display:none;">
        <h1 style="font-family:'Syne'">Administration</h1>
        <div style="background:#fff; padding:30px; border-radius:20px; border:1px solid #eee; max-width:500px;">
            <h3>➕ Nouveau profil</h3>
            <input type="text" id="newN" placeholder="Nom Prénom">
            <select id="newR">
                <option value="DSI">DSI (Violet)</option>
                <option value="RSSI">RSSI (Rose)</option>
                <option value="DATA">Data Engineer (Teal)</option>
                <option value="ADMIN">Super Admin (Blue)</option>
            </select>
            <button class="btn" style="width:100%" onclick="addUser()">Créer le profil</button>
        </div>
    </div>
</div>

<script>
    const URL = 'https://rkaymdbyfbmfiutwbjtx.supabase.co', KEY = 'sb_publishable_7W-CJaPMGcuVRS5iy0Zx-w_y_KkiGrH';
    const supabase = window.supabase.createClient(URL, KEY);
    let db = null, user = null;
    const COLORS = { DSI:'#7C5CFC', RSSI:'#E84568', DATA:'#00B49C', ADMIN:'#1A6CF5' };
    const TOOLS = [
        {id:1, t:"Capacités Métier", ico:"🧭"}, {id:2, t:"Transformation IT", ico:"⚡"}, {id:3, t:"Objectifs Strat", ico:"🎯"}, {id:4, t:"Écosystème", ico:"🌐"},
        {id:5, t:"Portefeuille App", ico:"📱"}, {id:6, t:"Flux & Interfaces", ico:"🔗"}, {id:7, t:"Mapping Cap/App", ico:"🗺️"}, {id:8, t:"Obsolescence", ico:"🕰️"},
        {id:9, t:"Données Métier", ico:"🗄️"}, {id:10, t:"Lineage Data", ico:"📉"}, {id:11, t:"RGPD", ico:"⚖️"}, {id:12, t:"Analytique", ico:"📊"},
        {id:13, t:"Infrastructure", ico:"🖥️"}, {id:14, t:"Sécurité SI", ico:"🛡️"}, {id:15, t:"Standards", ico:"📜"}, {id:16, t:"Cloud Arch", ico:"☁️"},
        {id:17, t:"Processus", ico:"🏢"}, {id:18, t:"Parties Prenantes", ico:"👥"}, {id:19, t:"Gouvernance", ico:"⚖️"}, {id:20, t:"Risques SI", ico:"⚠️"},
        {id:21, t:"Roadmap SI", ico:"🗓️"}, {id:22, t:"Impact Projets", ico:"💥"}, {id:23, t:"Coût IT", ico:"💰"}, {id:24, t:"Innovation", ico:"💡"}
    ];

    async function load() {
        try {
            const { data, error } = await supabase.from('ea_platform_data').select('content').eq('id', 1).single();
            if (error) throw error;
            db = data.content;
            if (!db.users || db.users.length === 0) {
                document.getElementById('stTitle').innerText = "Configuration Super Admin";
                document.getElementById('authActions').innerHTML = `<input type="text" id="admN" placeholder="Nom Prénom"><input type="email" id="admE" placeholder="Email"><button class="btn" style="width:100%" onclick="setup()">Activer</button>`;
            } else {
                document.getElementById('stTitle').innerText = "Accès SI Governance";
                document.getElementById('authActions').innerHTML = `<select id="uSel">${db.users.map(u => `<option value="${u.id}">${u.name} (${u.role})</option>`).join('')}</select><button class="btn" style="width:100%; margin-top:10px;" onclick="enter()">Entrer</button>`;
            }
        } catch (e) { document.getElementById('stTitle').innerText = "Erreur Cloud SQL"; }
    }

    async function setup() {
        const n = document.getElementById('admN').value, e = document.getElementById('admE').value;
        db.users = [{name:n, email:e, role:'ADMIN', id:Date.now()}];
        await supabase.from('ea_platform_data').update({ content: db }).eq('id', 1);
        location.reload();
    }

    function enter() {
        user = db.users.find(u => u.id == document.getElementById('uSel').value);
        document.getElementById('authScreen').classList.remove('active');
        document.getElementById('appScreen').classList.add('active');
        const theme = COLORS[user.role] || '#1A6CF5';
        document.documentElement.style.setProperty('--u-color', theme);
        document.getElementById('uAvatar').innerText = user.name[0];
        if (user.role === 'ADMIN') document.getElementById('admLink').style.display = 'inline';
        render();
    }

    function render() {
        document.getElementById('mainContainer').innerHTML = TOOLS.map(t => {
            const s = db.viewsStatus[t.id] || "Non démarré";
            return `<div class="vp-card"><span>${t.ico}</span> <b>${t.t}</b><select onchange="up(${t.id}, this.value)" style="margin-top:10px;"><option ${s==='Non démarré'?'selected':''}>Non démarré</option><option ${s==='En cours'?'selected':''}>En cours</option><option ${s==='Réalisé'?'selected':''}>Réalisé</option></select></div>`;
        }).join('');
    }

    async function up(id, s) { db.viewsStatus[id] = s; await supabase.from('ea_platform_data').update({ content: db }).eq('id', 1); }
    function tab(id) { document.getElementById('diagSection').style.display = id==='diag'?'block':'none'; document.getElementById('adminSection').style.display = id==='admin'?'block':'none'; }
    async function addUser() { db.users.push({name:document.getElementById('newN').value, role:document.getElementById('newR').value, id:Date.now()}); await supabase.from('ea_platform_data').update({ content: db }).eq('id', 1); alert("Créé !"); }
    function exportPDF() { html2pdf().from(document.getElementById('diagSection')).save('Rapport.pdf'); }
    load();
</script>
</body>
</html>
