<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SI Governance | Authentification</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Instrument Sans', sans-serif;
            background: linear-gradient(135deg, #0B1829 0%, #1a2a3f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container { width:100%; max-width:480px; }
        .auth-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .logo { text-align:center; margin-bottom:32px; }
        .logo h1 { font-family:'Syne'; font-size:28px; color:#fff; letter-spacing:2px; }
        .logo p { color:rgba(255,255,255,0.6); font-size:14px; margin-top:8px; }
        .form-group { margin-bottom:20px; }
        .form-group label {
            display:block; color:rgba(255,255,255,0.8); font-size:13px; font-weight:600; margin-bottom:8px;
        }
        .form-group input, .form-group select {
            width:100%; padding:14px 16px;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.15);
            border-radius:12px;
            color:#fff;
            font-size:14px;
            font-family:inherit;
            transition:all 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            outline:none; border-color:#1A6CF5; background:rgba(255,255,255,0.12);
        }
        .security-question {
            background:rgba(255,255,255,0.03);
            border-radius:12px;
            padding:16px;
            margin-bottom:20px;
            border:1px solid rgba(255,255,255,0.1);
        }
        .security-question .question {
            color:rgba(255,255,255,0.9);
            font-size:13px;
            margin-bottom:12px;
            font-weight:600;
        }
        .captcha {
            background:rgba(255,255,255,0.03);
            border-radius:12px;
            padding:16px;
            margin-bottom:24px;
            text-align:center;
        }
        .captcha-question {
            font-size:24px;
            font-weight:700;
            color:#1A6CF5;
            margin-bottom:12px;
        }
        .btn-login {
            width:100%;
            padding:14px;
            background:#1A6CF5;
            border:none;
            border-radius:12px;
            color:#fff;
            font-weight:700;
            font-size:15px;
            cursor:pointer;
            transition:all 0.2s;
            margin-bottom:16px;
        }
        .btn-login:hover { background:#1558cc; transform:translateY(-1px); }
        .btn-login:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
        .forgot-link { text-align:center; margin-top:16px; }
        .forgot-link a { color:rgba(255,255,255,0.6); text-decoration:none; font-size:13px; transition:color 0.2s; }
        .forgot-link a:hover { color:#1A6CF5; }
        .error-message {
            background:rgba(232,69,104,0.2);
            border:1px solid #E84568;
            border-radius:12px;
            padding:12px;
            margin-bottom:20px;
            color:#FF8FAD;
            font-size:13px;
            display:none;
        }
        .success-message {
            background:rgba(0,180,156,0.2);
            border:1px solid #00B49C;
            border-radius:12px;
            padding:12px;
            margin-bottom:20px;
            color:#00B49C;
            font-size:13px;
            display:none;
        }
        .loader {
            display:flex;
            align-items:center;
            justify-content:center;
            gap:10px;
            margin:20px 0;
            display:none;
        }
        .spinner {
            width:20px;
            height:20px;
            border:2px solid rgba(255,255,255,0.2);
            border-top-color:#fff;
            border-radius:50%;
            animation:spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        hr { border:none; border-top:1px solid rgba(255,255,255,0.1); margin:24px 0 16px; }
        .info-text { text-align:center; color:rgba(255,255,255,0.4); font-size:11px; margin-top:20px; }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="logo">
            <h1>SI GOVERNANCE</h1>
            <p>v5.0 · Sécurité & Conformité</p>
        </div>

        <div id="loginView">
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            <div id="loader" class="loader">
                <div class="spinner"></div>
                <span style="color:#fff;">Connexion en cours...</span>
            </div>

            <div class="form-group">
                <label>📧 Email professionnel</label>
                <input type="email" id="email" placeholder="prenom.nom@entreprise.fr" autocomplete="email">
            </div>

            <div class="form-group">
                <label>🔒 Mot de passe</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
            </div>

            <div class="security-question">
                <div class="question">❓ Question de sécurité (pour récupération)</div>
                <select id="securityQuestion">
                    <option value="">Sélectionnez une question</option>
                </select>
                <input type="text" id="securityAnswer" placeholder="Votre réponse" style="margin-top:12px;">
            </div>

            <div class="captcha">
                <div class="captcha-question" id="captchaQuestion">0 + 0 = ?</div>
                <input type="number" id="captchaAnswer" placeholder="Résultat" style="width:100%; padding:12px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:12px; color:#fff; text-align:center;">
            </div>

            <button class="btn-login" id="loginBtn">Se connecter</button>

            <div class="forgot-link">
                <a href="#" id="forgotLink">🔑 Mot de passe oublié ?</a>
            </div>

            <hr>
            <div class="info-text">
                Contactez votre administrateur pour obtenir un compte
            </div>
        </div>

        <div id="forgotView" style="display: none;">
            <div id="forgotErrorMessage" class="error-message"></div>
            <div id="forgotSuccessMessage" class="success-message"></div>
            <div id="forgotLoader" class="loader">
                <div class="spinner"></div>
                <span style="color:#fff;">Vérification...</span>
            </div>

            <div class="form-group">
                <label>📧 Email professionnel</label>
                <input type="email" id="forgotEmail" placeholder="prenom.nom@entreprise.fr">
            </div>

            <div class="security-question">
                <div class="question">❓ Question de sécurité</div>
                <select id="forgotSecurityQuestion">
                    <option value="">Sélectionnez une question</option>
                </select>
                <input type="text" id="forgotSecurityAnswer" placeholder="Votre réponse" style="margin-top:12px;">
            </div>

            <div class="captcha">
                <div class="captcha-question" id="forgotCaptchaQuestion">0 + 0 = ?</div>
                <input type="number" id="forgotCaptchaAnswer" placeholder="Résultat" style="width:100%; padding:12px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:12px; color:#fff; text-align:center;">
            </div>

            <button class="btn-login" id="resetBtn">Réinitialiser le mot de passe</button>
            <div class="forgot-link" style="margin-top: 16px;">
                <a href="#" id="backToLoginLink">← Retour à la connexion</a>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://rkaymdbyfbmfiutwbjtx.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7W-CJaPMGcuVRS5iy0Zx-w_y_KkiGrH';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let securityQuestions = [];
    let currentCaptcha = { a: 0, b: 0, answer: 0 };

    // --------------------------------------------------------------
    //  AFFICHAGE DES ERREURS / SUCCÈS
    // --------------------------------------------------------------
    function showError(msg) {
        const div = document.getElementById('errorMessage');
        div.textContent = msg;
        div.style.display = 'block';
        setTimeout(() => div.style.display = 'none', 8000);
    }
    function showSuccess(msg) {
        const div = document.getElementById('successMessage');
        div.textContent = msg;
        div.style.display = 'block';
        setTimeout(() => div.style.display = 'none', 5000);
    }
    function showForgotError(msg) {
        const div = document.getElementById('forgotErrorMessage');
        div.textContent = msg;
        div.style.display = 'block';
        setTimeout(() => div.style.display = 'none', 8000);
    }
    function showForgotSuccess(msg) {
        const div = document.getElementById('forgotSuccessMessage');
        div.textContent = msg;
        div.style.display = 'block';
        setTimeout(() => div.style.display = 'none', 5000);
    }

    // --------------------------------------------------------------
    //  CHARGEMENT DES QUESTIONS DE SÉCURITÉ
    // --------------------------------------------------------------
    async function loadSecurityQuestions() {
        const { data, error } = await sb.from('security_questions').select('*');
        if (error) console.error('Erreur chargement questions:', error);
        securityQuestions = data || [
            { id: 1, question_text: "Quel est le nom de votre premier animal de compagnie ?" },
            { id: 2, question_text: "Quelle est votre ville de naissance ?" },
            { id: 3, question_text: "Quel est le modèle de votre première voiture ?" },
            { id: 4, question_text: "Quel est le nom de votre meilleur ami d'enfance ?" },
            { id: 5, question_text: "Quelle est votre couleur préférée ?" }
        ];
        const select = document.getElementById('securityQuestion');
        const forgotSelect = document.getElementById('forgotSecurityQuestion');
        if (select) {
            select.innerHTML = '<option value="">Sélectionnez une question</option>' + 
                securityQuestions.map(q => `<option value="${q.id}">${q.question_text}</option>`).join('');
        }
        if (forgotSelect) {
            forgotSelect.innerHTML = '<option value="">Sélectionnez une question</option>' + 
                securityQuestions.map(q => `<option value="${q.id}">${q.question_text}</option>`).join('');
        }
    }

    // --------------------------------------------------------------
    //  CAPTCHA
    // --------------------------------------------------------------
    function generateCaptcha() {
        const a = Math.floor(Math.random() * 10) + 1;
        const b = Math.floor(Math.random() * 10) + 1;
        currentCaptcha = { a, b, answer: a + b };
        return `${a} + ${b} = ?`;
    }
    function updateCaptchaDisplay() {
        const captchaQuestion = document.getElementById('captchaQuestion');
        const forgotCaptchaQuestion = document.getElementById('forgotCaptchaQuestion');
        const question = generateCaptcha();
        if (captchaQuestion) captchaQuestion.textContent = question;
        if (forgotCaptchaQuestion) forgotCaptchaQuestion.textContent = `${currentCaptcha.a} + ${currentCaptcha.b} = ?`;
    }

    // --------------------------------------------------------------
    //  HASHAGE POUR LES QUESTIONS DE SÉCURITÉ
    // --------------------------------------------------------------
    async function hashAnswer(text) {
        const encoder = new TextEncoder();
        const data = encoder.encode(text.toLowerCase().trim());
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // --------------------------------------------------------------
    //  VÉRIFICATION DE LA QUESTION DE SÉCURITÉ (pour récupération)
    // --------------------------------------------------------------
    async function verifySecurityQuestion(email, questionId, answer) {
        // Récupérer l'utilisateur dans la table `users`
        const { data: userData, error: userError } = await sb
            .from('users')
            .select('id')
            .eq('email', email)
            .single();
        if (userError || !userData) return false;

        const hashedAnswer = await hashAnswer(answer);
        const { data, error } = await sb
            .from('user_security_answers')
            .select('*')
            .eq('user_id', userData.id)
            .eq('question_id', questionId)
            .eq('answer_hash', hashedAnswer)
            .single();
        return !error && data;
    }

    // --------------------------------------------------------------
    //  CONNEXION (sans création automatique)
    // --------------------------------------------------------------
    async function doLogin() {
        const email = document.getElementById('email').value.trim();
        const pwd = document.getElementById('password').value;
        const captchaAnswer = parseInt(document.getElementById('captchaAnswer').value);
        if (!email || !pwd) {
            showError('Email et mot de passe requis');
            return;
        }
        if (isNaN(captchaAnswer) || captchaAnswer !== currentCaptcha.answer) {
            showError('Anti-spam incorrect');
            updateCaptchaDisplay();
            return;
        }

        const btn = document.getElementById('loginBtn');
        const loader = document.getElementById('loader');
        btn.disabled = true;
        loader.style.display = 'flex';

        try {
            const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
            if (error) throw error;

            // Stocker le token JWT pour les futures requêtes API
            localStorage.setItem('supabase_token', data.session.access_token);

            showSuccess('Connexion réussie ! Redirection...');
            setTimeout(() => {
                window.location.href = '/dashboard.html';
            }, 1500);
        } catch (err) {
            console.error('Erreur de connexion:', err);
            showError('❌ ' + (err.message || 'Identifiants incorrects'));
            btn.disabled = false;
            loader.style.display = 'none';
        }
    }

    // --------------------------------------------------------------
    //  RÉINITIALISATION DU MOT DE PASSE (avec question de sécurité)
    // --------------------------------------------------------------
    async function doResetPassword() {
        const email = document.getElementById('forgotEmail').value.trim();
        const questionId = document.getElementById('forgotSecurityQuestion').value;
        const answer = document.getElementById('forgotSecurityAnswer').value.trim();
        const captchaAnswer = parseInt(document.getElementById('forgotCaptchaAnswer').value);

        if (!email) {
            showForgotError('Email requis');
            return;
        }
        if (!questionId) {
            showForgotError('Veuillez sélectionner une question de sécurité');
            return;
        }
        if (!answer) {
            showForgotError('Veuillez répondre à la question de sécurité');
            return;
        }
        if (isNaN(captchaAnswer) || captchaAnswer !== currentCaptcha.answer) {
            showForgotError('Réponse anti-spam incorrecte');
            updateCaptchaDisplay();
            return;
        }

        const btn = document.getElementById('resetBtn');
        const loader = document.getElementById('forgotLoader');
        btn.disabled = true;
        loader.style.display = 'flex';

        try {
            const isValid = await verifySecurityQuestion(email, parseInt(questionId), answer);
            if (!isValid) throw new Error('Question de sécurité incorrecte');

            // Générer un nouveau mot de passe aléatoire
            const newPassword = Math.random().toString(36).slice(-12) + 'A1!';
            const { error: updateError } = await sb.auth.admin.updateUserByEmail(email, { password: newPassword });
            if (updateError) throw updateError;

            showForgotSuccess(`✅ Nouveau mot de passe envoyé à ${email}`);
            setTimeout(() => {
                document.getElementById('forgotView').style.display = 'none';
                document.getElementById('loginView').style.display = 'block';
                btn.disabled = false;
                loader.style.display = 'none';
                updateCaptchaDisplay();
            }, 3000);
        } catch (err) {
            showForgotError('❌ ' + err.message);
            btn.disabled = false;
            loader.style.display = 'none';
        }
    }

    // --------------------------------------------------------------
    //  ÉVÉNEMENTS
    // --------------------------------------------------------------
    document.getElementById('loginBtn').addEventListener('click', doLogin);
    document.getElementById('resetBtn').addEventListener('click', doResetPassword);
    document.getElementById('forgotLink').addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('forgotView').style.display = 'block';
        updateCaptchaDisplay();
    });
    document.getElementById('backToLoginLink').addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('forgotView').style.display = 'none';
        document.getElementById('loginView').style.display = 'block';
        updateCaptchaDisplay();
    });
    document.getElementById('password').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') doLogin();
    });

    loadSecurityQuestions();
    updateCaptchaDisplay();
    window.location.href = '/dashboard.html';
</script>
</body>
</html>
