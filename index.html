<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SI Governance | Authentification</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0B1829 0%, #1a2a3f 100%);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full">
        <div class="bg-white/5 backdrop-blur-lg rounded-2xl p-8 border border-white/10 shadow-xl">
            <div class="text-center mb-8">
                <h1 class="font-['Syne'] text-3xl text-white">SI GOVERNANCE</h1>
                <p class="text-white/60 text-sm mt-2">v5.0 · Sécurité & Conformité</p>
            </div>

            <div id="loginView">
                <div id="errorMessage" class="bg-red-500/20 border border-red-500 text-red-300 rounded-xl p-3 text-sm mb-4 hidden"></div>
                <div id="successMessage" class="bg-green-500/20 border border-green-500 text-green-300 rounded-xl p-3 text-sm mb-4 hidden"></div>
                <div id="loader" class="flex justify-center items-center gap-2 my-4 hidden">
                    <div class="w-5 h-5 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
                    <span class="text-white">Connexion en cours...</span>
                </div>

                <div class="mb-4">
                    <label class="block text-white/80 text-sm font-semibold mb-2">📧 Email professionnel</label>
                    <input type="email" id="email" class="w-full bg-white/10 border border-white/20 rounded-xl p-3 text-white placeholder-white/40 focus:outline-none focus:border-blue-500" placeholder="prenom.nom@entreprise.fr">
                </div>

                <div class="mb-4">
                    <label class="block text-white/80 text-sm font-semibold mb-2">🔒 Mot de passe</label>
                    <input type="password" id="password" class="w-full bg-white/10 border border-white/20 rounded-xl p-3 text-white placeholder-white/40 focus:outline-none focus:border-blue-500" placeholder="••••••••">
                </div>

                <div class="bg-white/5 rounded-xl p-4 mb-4 border border-white/10">
                    <div class="text-white/90 text-sm font-semibold mb-2">❓ Question de sécurité</div>
                    <select id="securityQuestion" class="w-full bg-white/10 border border-white/20 rounded-xl p-2 text-white mb-2">
                        <option value="">Sélectionnez une question</option>
                    </select>
                    <input type="text" id="securityAnswer" class="w-full bg-white/10 border border-white/20 rounded-xl p-2 text-white placeholder-white/40" placeholder="Votre réponse">
                </div>

                <div class="bg-white/5 rounded-xl p-4 mb-6 text-center">
                    <div class="text-2xl font-bold text-blue-400 mb-2" id="captchaQuestion">0 + 0 = ?</div>
                    <input type="number" id="captchaAnswer" class="w-full bg-white/10 border border-white/20 rounded-xl p-2 text-white text-center" placeholder="Résultat">
                </div>

                <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">Se connecter</button>

                <div class="text-center mt-4">
                    <a href="#" id="forgotLink" class="text-white/60 hover:text-white text-sm">🔑 Mot de passe oublié ?</a>
                </div>

                <hr class="my-6 border-white/10">
                <div class="text-white/40 text-xs text-center">Contactez votre administrateur pour obtenir un compte</div>
            </div>

            <div id="forgotView" class="hidden">
                <!-- Copier le contenu du bloc "Mot de passe oublié" de la version précédente -->
                <!-- Pour simplifier, je le reprends ci‑dessous -->
                <div id="forgotErrorMessage" class="bg-red-500/20 border border-red-500 text-red-300 rounded-xl p-3 text-sm mb-4 hidden"></div>
                <div id="forgotSuccessMessage" class="bg-green-500/20 border border-green-500 text-green-300 rounded-xl p-3 text-sm mb-4 hidden"></div>
                <div id="forgotLoader" class="flex justify-center items-center gap-2 my-4 hidden">
                    <div class="w-5 h-5 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
                    <span class="text-white">Vérification...</span>
                </div>

                <div class="mb-4">
                    <label class="block text-white/80 text-sm font-semibold mb-2">📧 Email professionnel</label>
                    <input type="email" id="forgotEmail" class="w-full bg-white/10 border border-white/20 rounded-xl p-3 text-white">
                </div>

                <div class="bg-white/5 rounded-xl p-4 mb-4 border border-white/10">
                    <div class="text-white/90 text-sm font-semibold mb-2">❓ Question de sécurité</div>
                    <select id="forgotSecurityQuestion" class="w-full bg-white/10 border border-white/20 rounded-xl p-2 text-white mb-2"></select>
                    <input type="text" id="forgotSecurityAnswer" class="w-full bg-white/10 border border-white/20 rounded-xl p-2 text-white" placeholder="Votre réponse">
                </div>

                <div class="bg-white/5 rounded-xl p-4 mb-6 text-center">
                    <div class="text-2xl font-bold text-blue-400 mb-2" id="forgotCaptchaQuestion">0 + 0 = ?</div>
                    <input type="number" id="forgotCaptchaAnswer" class="w-full bg-white/10 border border-white/20 rounded-xl p-2 text-white text-center" placeholder="Résultat">
                </div>

                <button id="resetBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">Réinitialiser le mot de passe</button>
                <div class="text-center mt-4">
                    <a href="#" id="backToLoginLink" class="text-white/60 hover:text-white text-sm">← Retour à la connexion</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rkaymdbyfbmfiutwbjtx.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_7W-CJaPMGcuVRS5iy0Zx-w_y_KkiGrH';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let securityQuestions = [];
        let currentCaptcha = { a: 0, b: 0, answer: 0 };

        async function loadSecurityQuestions() {
            const { data, error } = await sb.from('security_questions').select('*');
            if (error) {
                console.error('Erreur chargement questions:', error);
                securityQuestions = [
                    { id: 1, question_text: "Quel est le nom de votre premier animal de compagnie ?" },
                    { id: 2, question_text: "Quelle est votre ville de naissance ?" },
                    { id: 3, question_text: "Quel est le modèle de votre première voiture ?" },
                    { id: 4, question_text: "Quel est le nom de votre meilleur ami d'enfance ?" },
                    { id: 5, question_text: "Quelle est votre couleur préférée ?" }
                ];
            } else {
                securityQuestions = data;
            }
            const select = document.getElementById('securityQuestion');
            const forgotSelect = document.getElementById('forgotSecurityQuestion');
            if (select) {
                select.innerHTML = '<option value="">Sélectionnez une question</option>' + 
                    securityQuestions.map(q => `<option value="${q.id}">${q.question_text}</option>`).join('');
            }
            if (forgotSelect) {
                forgotSelect.innerHTML = '<option value="">Sélectionnez une question</option>' + 
                    securityQuestions.map(q => `<option value="${q.id}">${q.question_text}</option>`).join('');
            }
        }

        function generateCaptcha() {
            const a = Math.floor(Math.random() * 10) + 1;
            const b = Math.floor(Math.random() * 10) + 1;
            currentCaptcha = { a, b, answer: a + b };
            return `${a} + ${b} = ?`;
        }

        function updateCaptchaDisplay() {
            const captchaQuestion = document.getElementById('captchaQuestion');
            const forgotCaptchaQuestion = document.getElementById('forgotCaptchaQuestion');
            const question = generateCaptcha();
            if (captchaQuestion) captchaQuestion.textContent = question;
            if (forgotCaptchaQuestion) forgotCaptchaQuestion.textContent = `${currentCaptcha.a} + ${currentCaptcha.b} = ?`;
        }

        function showError(message) {
            const div = document.getElementById('errorMessage');
            div.textContent = message;
            div.classList.remove('hidden');
            setTimeout(() => div.classList.add('hidden'), 5000);
        }

        function showSuccess(message) {
            const div = document.getElementById('successMessage');
            div.textContent = message;
            div.classList.remove('hidden');
            setTimeout(() => div.classList.add('hidden'), 5000);
        }

        function showForgotError(message) {
            const div = document.getElementById('forgotErrorMessage');
            div.textContent = message;
            div.classList.remove('hidden');
            setTimeout(() => div.classList.add('hidden'), 5000);
        }

        function showForgotSuccess(message) {
            const div = document.getElementById('forgotSuccessMessage');
            div.textContent = message;
            div.classList.remove('hidden');
            setTimeout(() => div.classList.add('hidden'), 5000);
        }

        async function hashAnswer(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text.toLowerCase().trim());
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function verifySecurityQuestion(email, questionId, answer) {
            // Récupérer l'utilisateur dans la table `users`
            const { data: userData, error: userError } = await sb
                .from('users')
                .select('id')
                .eq('email', email)
                .single();
            if (userError || !userData) return false;

            const hashedAnswer = await hashAnswer(answer);
            const { data, error } = await sb
                .from('user_security_answers')
                .select('*')
                .eq('user_id', userData.id)
                .eq('question_id', questionId)
                .eq('answer_hash', hashedAnswer)
                .single();
            return !error && data;
        }

        async function ensureUserProfile(userId, email) {
            // Vérifier si l'utilisateur existe déjà
            let { data: existing, error } = await sb
                .from('users')
                .select('*')
                .eq('id', userId)
                .maybeSingle();

            if (existing) return existing;

            // Vérifier si une société existe déjà (pour le multi‑tenant, on prend la première ou on en crée une)
            let { data: companies } = await sb.from('companies').select('id').limit(1);
            let companyId = companies && companies[0] ? companies[0].id : null;

            if (!companyId) {
                const { data: newCompany } = await sb
                    .from('companies')
                    .insert({ name: 'Ma Société' })
                    .select()
                    .single();
                companyId = newCompany.id;
            }

            // Insérer l'utilisateur
            const { data: newUser, error: insertErr } = await sb
                .from('users')
                .insert({ id: userId, email, company_id: companyId })
                .select()
                .single();
            if (insertErr) throw insertErr;

            // Vérifier si c'est le premier utilisateur de la société
            const { count } = await sb
                .from('users')
                .select('*', { count: 'exact', head: true })
                .eq('company_id', companyId);

            const role = (count === 1) ? 'SUPER_ADMIN' : 'SERVICE_MANAGER';
            await sb.from('user_roles').insert({ user_id: userId, role_id: role });

            return newUser;
        }

        async function doLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const captchaInput = document.getElementById('captchaAnswer').value;

            if (!email || !password) {
                showError('Email et mot de passe requis');
                return;
            }
            if (parseInt(captchaInput) !== currentCaptcha.answer) {
                showError('Réponse anti-spam incorrecte');
                updateCaptchaDisplay();
                return;
            }

            const btn = document.getElementById('loginBtn');
            const loader = document.getElementById('loader');
            btn.disabled = true;
            loader.classList.remove('hidden');

            try {
                const { data, error } = await sb.auth.signInWithPassword({ email, password });
                if (error) throw error;

                await ensureUserProfile(data.user.id, email);

                // Stocker le token pour les requêtes API
                localStorage.setItem('supabase_token', data.session.access_token);

                showSuccess('Connexion réussie ! Redirection...');
                setTimeout(() => {
                    window.location.href = '/dashboard.html';
                }, 1500);
            } catch (err) {
                showError('❌ ' + err.message);
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        }

        async function doResetPassword() {
            const email = document.getElementById('forgotEmail').value.trim();
            const questionId = document.getElementById('forgotSecurityQuestion').value;
            const answer = document.getElementById('forgotSecurityAnswer').value.trim();
            const captchaInput = document.getElementById('forgotCaptchaAnswer').value;

            if (!email) {
                showForgotError('Email requis');
                return;
            }
            if (!questionId) {
                showForgotError('Veuillez sélectionner une question de sécurité');
                return;
            }
            if (!answer) {
                showForgotError('Veuillez répondre à la question de sécurité');
                return;
            }
            if (parseInt(captchaInput) !== currentCaptcha.answer) {
                showForgotError('Réponse anti-spam incorrecte');
                updateCaptchaDisplay();
                return;
            }

            const btn = document.getElementById('resetBtn');
            const loader = document.getElementById('forgotLoader');
            btn.disabled = true;
            loader.classList.remove('hidden');

            try {
                const isValid = await verifySecurityQuestion(email, parseInt(questionId), answer);
                if (!isValid) throw new Error('Question de sécurité incorrecte');

                // Générer un nouveau mot de passe aléatoire
                const newPassword = Math.random().toString(36).slice(-12) + 'A1!';
                const { error: updateError } = await sb.auth.admin.updateUserByEmail(email, { password: newPassword });
                if (updateError) throw updateError;

                showForgotSuccess(`✅ Nouveau mot de passe envoyé à ${email}`);
                setTimeout(() => {
                    document.getElementById('forgotView').style.display = 'none';
                    document.getElementById('loginView').style.display = 'block';
                    btn.disabled = false;
                    loader.classList.add('hidden');
                }, 3000);
            } catch (err) {
                showForgotError('❌ ' + err.message);
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        }

        // Événements
        document.getElementById('loginBtn').addEventListener('click', doLogin);
        document.getElementById('resetBtn').addEventListener('click', doResetPassword);
        document.getElementById('forgotLink').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('forgotView').style.display = 'block';
            updateCaptchaDisplay();
        });
        document.getElementById('backToLoginLink').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('forgotView').style.display = 'none';
            document.getElementById('loginView').style.display = 'block';
            updateCaptchaDisplay();
        });
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doLogin();
        });

        loadSecurityQuestions();
        updateCaptchaDisplay();
    </script>
</body>
</html>
