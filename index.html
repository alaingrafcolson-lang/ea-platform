<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SI Governance | Connexion</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; background: #0B1829; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 16px; width: 350px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; }
        button { background: #1A6CF5; color: white; cursor: pointer; }
        .error { color: #ff8fad; margin-top: 10px; }
    </style>
</head>
<body>
<div class="card">
    <h2>SI Governance</h2>
    <input type="email" id="email" placeholder="Email professionnel">
    <input type="password" id="password" placeholder="Mot de passe">
    <button onclick="login()">Se connecter</button>
    <div id="error" class="error"></div>
</div>

<script>
    const supabase = supabase.createClient(
        'https://rkaymdbyfbmfiutwbjtx.supabase.co',
        'sb_publishable_7W-CJaPMGcuVRS5iy0Zx-w_y_KkiGrH',
        { auth: { persistSession: true } }
    );

    async function login() {
        const email = document.getElementById('email').value;
        const pwd = document.getElementById('password').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password: pwd });
        if (error) {
            document.getElementById('error').innerText = error.message;
            return;
        }
        // Redirection simple – Supabase conserve la session automatiquement
        window.location.href = '/dashboard.html';
    }
</script>
</body>
</html>
