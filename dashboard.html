<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SI Governance | Tableau de bord</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Instrument Sans', sans-serif;
            background: #F4F7FB;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            text-align: center;
        }
        h1 {
            font-family: 'Syne';
            color: #0B1829;
        }
        .logout-btn {
            margin-top: 20px;
            background: #E84568;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tableau de bord (version test)</h1>
        <p>Bienvenue ! Vous êtes connecté.</p>
        <p>Le contenu complet sera bientôt disponible.</p>
        <button class="logout-btn" onclick="doLogout()">Déconnexion</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://rkaymdbyfbmfiutwbjtx.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_7W-CJaPMGcuVRS5iy0Zx-w_y_KkiGrH';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function checkAuth() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) {
                window.location.href = '/index.html';
            }
        }

        async function doLogout() {
            await sb.auth.signOut();
            window.location.href = '/index.html';
        }

        checkAuth();
    </script>
</body>
</html>
