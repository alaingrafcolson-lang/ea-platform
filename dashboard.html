<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tableau de bord</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; background: #F4F7FB; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 16px; }
        button { background: #E84568; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h2>Tableau de bord</h2>
    <div id="userInfo">Chargement...</div>
    <button onclick="logout()">Déconnexion</button>
</div>

<script>
    const supabase = supabase.createClient(
        'https://rkaymdbyfbmfiutwbjtx.supabase.co',
        'sb_publishable_7W-CJaPMGcuVRS5iy0Zx-w_y_KkiGrH',
        { auth: { persistSession: true } }
    );

    async function checkAuth() {
        const { data: { user }, error } = await supabase.auth.getUser();
        if (error || !user) {
            window.location.href = '/index.html';
            return;
        }
        document.getElementById('userInfo').innerHTML = `Connecté : ${user.email}`;
    }

    async function logout() {
        await supabase.auth.signOut();
        window.location.href = '/index.html';
    }

    checkAuth();
</script>
</body>
</html>
